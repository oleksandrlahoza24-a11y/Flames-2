<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Shadow Bridge</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #d1d1d1; touch-action: none; user-select: none; -webkit-user-select: none; }
        #ui { position: absolute; top: 40px; width: 100%; text-align: center; pointer-events: none; z-index: 10; font-family: -apple-system, sans-serif; }
        #score { font-size: 100px; font-weight: 900; color: rgba(0, 0, 0, 0.1); }
        #game-over { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; display: none; z-index: 20; }
        button { padding: 20px 50px; font-size: 20px; background: #000; color: #fff; border: none; border-radius: 40px; font-weight: bold; cursor: pointer; }
        canvas { display: block; }
    </style>
</head>
<body>
    <div id="ui"><div id="score">0</div></div>
    <div id="game-over">
        <h1 style="font-family: sans-serif; font-size: 40px;">FALLEN</h1>
        <button onclick="resetGame()">RETRY</button>
    </div>
    <canvas id="gameCanvas"></canvas>

    <!-- Load scripts in specific order -->
    <script src="terrainDetails.js"></script>
    <script src="graphics.js"></script>
    <script src="terrain.js"></script>
</body>
</html>
