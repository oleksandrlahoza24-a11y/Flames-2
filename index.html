<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>My Pixel World - Enhanced</title>
    <style>
        body {
            margin: 0; padding: 0;
            background-color: #7ec850;
            overflow: hidden;
            font-family: sans-serif;
            touch-action: none;
            user-select: none;
        }
        canvas { display: block; image-rendering: pixelated; }
        
        /* 🎮 ENHANCED D-PAD */
        #dpad {
            position: fixed;
            bottom: 30px;
            right: 30px;
            display: grid;
            grid-template-columns: repeat(3, 60px);
            grid-template-rows: repeat(2, 60px);
            gap: 10px;
            z-index: 10;
        }
        .dbtn {
            background-color: rgba(0, 0, 0, 0.4);
            color: white;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 12px;
            font-size: 24px;
            display: flex;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(4px);
        }
        .dbtn:active { background-color: rgba(255, 255, 255, 0.4); color: #000; }
        #btn-up { grid-column: 2; grid-row: 1; }
        #btn-left { grid-column: 1; grid-row: 2; }
        #btn-down { grid-column: 2; grid-row: 2; }
        #btn-right { grid-column: 3; grid-row: 2; }
    </style>
</head>
<body>

    <canvas id="gameCanvas"></canvas>

    <div id="dpad">
        <div class="dbtn" id="btn-up">▲</div>
        <div class="dbtn" id="btn-left">◀</div>
        <div class="dbtn" id="btn-down">▼</div>
        <div class="dbtn" id="btn-right">▶</div>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        const player = {
            x: window.innerWidth / 2,
            y: window.innerHeight / 2,
            width: 24,
            height: 32,
            color: "#e74c3c",
            speed: 4
        };

        // ==========================================
        // 🌲 YOUR ASSETS (KEPT EXACTLY AS REQUESTED)
        // ==========================================
        const worldAssets = {
            trees: [
                { x: 100, y: 150, size: 40, color: '#27ae60', trunk: '#8e44ad' },
                { x: 600, y: 100, size: 50, color: '#2ecc71', trunk: '#8e44ad' },
                { x: 450, y: 400, size: 35, color: '#27ae60', trunk: '#8e44ad' },
                { x: 700, y: 500, size: 60, color: '#229954', trunk: '#8e44ad' },
                { x: 200, y: 600, size: 45, color: '#2ecc71', trunk: '#8e44ad' }
            ],
            bushes: [
                { x: 200, y: 400, size: 20, color: '#2ecc71' },
                { x: 230, y: 410, size: 25, color: '#27ae60' },
                { x: 180, y: 420, size: 15, color: '#2ecc71' },
                { x: 500, y: 200, size: 22, color: '#27ae60' }
            ],
            rocks: [
                { x: 300, y: 100, width: 25, height: 15, color: '#7f8c8d' },
                { x: 320, y: 110, width: 15, height: 10, color: '#95a5a6' },
                { x: 100, y: 500, width: 30, height: 20, color: '#7f8c8d' }
            ],
            waterPonds: [
                { x: 50, y: 50, width: 150, height: 80, color: '#3498db' },
                { x: 550, y: 300, width: 200, height: 120, color: '#2980b9' }
            ]
        };

        // ==========================================
        // ⌨️ INPUT HANDLING
        // ==========================================
        const keys = {};
        window.addEventListener("keydown", (e) => keys[e.key] = true);
        window.addEventListener("keyup", (e) => keys[e.key] = false);

        function bindDpad(id, key) {
            const btn = document.getElementById(id);
            btn.addEventListener("touchstart", (e) => { e.preventDefault(); keys[key] = true; });
            btn.addEventListener("touchend", (e) => { e.preventDefault(); keys[key] = false; });
            btn.addEventListener("mousedown", () => keys[key] = true);
            btn.addEventListener("mouseup", () => keys[key] = false);
        }
        bindDpad("btn-up", "ArrowUp"); bindDpad("btn-down", "ArrowDown");
        bindDpad("btn-left", "ArrowLeft"); bindDpad("btn-right", "ArrowRight");

        // ==========================================
        // ⚙️ PHYSICS & COLLISION
        // ==========================================
        function checkCollision(nx, ny) {
            // Screen Borders
            if (nx < 0 || nx + player.width > canvas.width || ny < 0 || ny + player.height > canvas.height) return true;

            // Rock Collision
            for (let r of worldAssets.rocks) {
                if (nx < r.x + r.width && nx + player.width > r.x && ny < r.y + r.height && ny + player.height > r.y) return true;
            }

            // Tree Trunk Collision (Trunk is only a small area at the bottom of the tree)
            for (let t of worldAssets.trees) {
                const trunkX = t.x - 5;
                const trunkY = t.y;
                if (nx < trunkX + 10 && nx + player.width > trunkX && ny < trunkY + 10 && ny + player.height > trunkY) return true;
            }
            return false;
        }

        function update() {
            let nextX = player.x;
            let nextY = player.y;

            if (keys.ArrowUp || keys.w) nextY -= player.speed;
            if (keys.ArrowDown || keys.s) nextY += player.speed;
            if (keys.ArrowLeft || keys.a) nextX -= player.speed;
            if (keys.ArrowRight || keys.d) nextX += player.speed;

            if (!checkCollision(nextX, player.y)) player.x = nextX;
            if (!checkCollision(player.x, nextY)) player.y = nextY;
        }

        // ==========================================
        // 🎨 DRAWING (WITH Y-SORTING)
        // ==========================================
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 1. Always Draw Ponds first (they are ground level)
            worldAssets.waterPonds.forEach(p => {
                ctx.fillStyle = p.color;
                ctx.beginPath();
                ctx.roundRect(p.x, p.y, p.width, p.height, 20);
                ctx.fill();
            });

            // 2. Collect all "standing" objects and the player for Y-Sorting
            let renderList = [];

            worldAssets.rocks.forEach(r => renderList.push({ ...r, type: 'rock', sortY: r.y + r.height }));
            worldAssets.bushes.forEach(b => renderList.push({ ...b, type: 'bush', sortY: b.y }));
            worldAssets.trees.forEach(t => renderList.push({ ...t, type: 'tree', sortY: t.y + 10 })); // Sort by trunk base
            renderList.push({ ...player, type: 'player', sortY: player.y + player.height });

            // Sort by Y position so items lower on screen are drawn on top
            renderList.sort((a, b) => a.sortY - b.sortY);

            // 3. Draw sorted items
            renderList.forEach(obj => {
                if (obj.type === 'rock') {
                    ctx.fillStyle = obj.color;
                    ctx.beginPath();
                    ctx.roundRect(obj.x, obj.y, obj.width, obj.height, 5);
                    ctx.fill();
                } 
                else if (obj.type === 'bush') {
                    ctx.fillStyle = obj.color;
                    ctx.beginPath();
                    ctx.arc(obj.x, obj.y, obj.size, 0, Math.PI * 2);
                    ctx.fill();
                } 
                else if (obj.type === 'tree') {
                    const cx = obj.x;
                    const cy = obj.y;
                    const s = obj.size;

                    // 1. Ground Shadow (Offset slightly for light source)
                    ctx.fillStyle = "rgba(0,0,0,0.15)";
                    ctx.beginPath();
                    ctx.ellipse(cx + (s * 0.2), cy + 8, s * 0.5, s * 0.2, 0, 0, Math.PI * 2);
                    ctx.fill();

                    // 2. Detailed Trunk
                    // Main Trunk
                    ctx.fillStyle = obj.trunk; 
                    ctx.fillRect(cx - 6, cy, 12, s * 0.6);
                    
                    // Trunk Shading (Right side shadow)
                    ctx.fillStyle = "rgba(0,0,0,0.2)";
                    ctx.fillRect(cx, cy, 6, s * 0.6);

                    // Bark Texture (Small vertical lines)
                    ctx.strokeStyle = "rgba(255,255,255,0.1)";
                    ctx.lineWidth = 1;
                    ctx.beginPath();
                    ctx.moveTo(cx - 3, cy + 5); ctx.lineTo(cx - 3, cy + (s * 0.4));
                    ctx.moveTo(cx + 2, cy + 2); ctx.lineTo(cx + 2, cy + (s * 0.5));
                    ctx.stroke();

                    // 3. Multi-Layered Canopy (Leaves)
                    // Bottom Shadow Layer (Darker)
                    ctx.fillStyle = "rgba(0,0,0,0.2)";
                    ctx.beginPath();
                    ctx.arc(cx, cy - (s * 0.3), s * 1.05, 0, Math.PI * 2);
                    ctx.fill();

                    // Main Leaves (Primary Color)
                    ctx.fillStyle = obj.color;
                    // Draw three overlapping circles to create a "bushy" look
                    ctx.beginPath();
                    ctx.arc(cx, cy - (s * 0.5), s, 0, Math.PI * 2); // Center
                    ctx.arc(cx - (s * 0.4), cy - (s * 0.3), s * 0.7, 0, Math.PI * 2); // Left clump
                    ctx.arc(cx + (s * 0.4), cy - (s * 0.3), s * 0.7, 0, Math.PI * 2); // Right clump
                    ctx.fill();

                    // Top Highlight Layer (Simulating sunlight from top-left)
                    ctx.fillStyle = "rgba(255,255,255,0.2)";
                    ctx.beginPath();
                    ctx.arc(cx - (s * 0.3), cy - (s * 0.7), s * 0.5, 0, Math.PI * 2);
                    ctx.fill();
                }
                else if (obj.type === 'player') {
                    // Player Shadow
                    ctx.fillStyle = "rgba(0,0,0,0.1)";
                    ctx.beginPath();
                    ctx.ellipse(obj.x + obj.width/2, obj.y + obj.height, 12, 5, 0, 0, Math.PI * 2);
                    ctx.fill();
                    // Player Body
                    ctx.fillStyle = obj.color;
                    ctx.fillRect(obj.x, obj.y, obj.width, obj.height);
                    // Eyes
                    ctx.fillStyle = "white";
                    ctx.fillRect(obj.x + 4, obj.y + 6, 4, 4);
                    ctx.fillRect(obj.x + 16, obj.y + 6, 4, 4);
                }
            });
        }

        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        gameLoop();
    </script>
</body>
</html>
