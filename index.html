<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Shadow Bridge: iPad Edition</title>
    <style>
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            overflow: hidden; background-color: #d1d1d1; 
            user-select: none; -webkit-user-select: none; touch-action: none;
        }
        #ui { 
            position: absolute; top: 5%; width: 100%; 
            text-align: center; pointer-events: none; z-index: 10; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
        #score { font-size: 100px; font-weight: 900; color: rgba(0, 0, 0, 0.1); }
        #game-over { 
            position: absolute; top: 50%; left: 50%; 
            transform: translate(-50%, -50%); text-align: center; 
            display: none; z-index: 20; font-family: sans-serif; 
        }
        button { 
            padding: 20px 50px; font-size: 25px; background: #000; 
            color: #fff; border: none; border-radius: 40px; font-weight: bold;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }
        canvas { display: block; }
    </style>
</head>
<body>

    <div id="ui">
        <div id="score">0</div>
    </div>

    <div id="game-over">
        <h1 style="font-size: 50px; color: #000; margin-bottom: 20px;">FALLEN</h1>
        <button onclick="resetGame()">TRY AGAIN</button>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        /** 
         * LEAF PARTICLE SYSTEM
         */
        const Particles = {
            list: [],
            spawn(x, y) {
                this.list.push({
                    x: x + (Math.random() - 0.5) * 40,
                    y: y - Math.random() * 50,
                    vx: (Math.random() - 0.5) * 1,
                    vy: 0.5 + Math.random() * 1,
                    sway: Math.random() * Math.PI * 2,
                    size: 2 + Math.random() * 3,
                    rotation: Math.random() * Math.PI
                });
            },
            update() {
                for (let i = this.list.length - 1; i >= 0; i--) {
                    let p = this.list[i];
                    p.y += p.vy;
                    p.sway += 0.05;
                    p.x += Math.sin(p.sway) * 0.5;
                    p.rotation += 0.02;
                    if (p.y > window.innerHeight) this.list.splice(i, 1);
                }
            },
            draw(ctx, viewOffset) {
                ctx.fillStyle = "rgba(0,0,0,0.6)";
                this.list.forEach(p => {
                    ctx.save();
                    ctx.translate(p.x - viewOffset, p.y);
                    ctx.rotate(p.rotation);
                    ctx.fillRect(-p.size/2, -p.size/2, p.size, p.size * 1.5);
                    ctx.restore();
                });
            }
        };

        /** 
         * ASSETS & DETAILS SCRIPT 
         */
        const Details = {
            list: [],
            generate(x, w) {
                const count = Math.floor(Math.random() * 2) + 1;
                for (let i = 0; i < count; i++) {
                    const type = Math.random() > 0.4 ? 'tree' : 'bush';
                    this.list.push({
                        x: x + (Math.random() * w),
                        type: type,
                        size: type === 'tree' ? 40 + Math.random() * 40 : 15 + Math.random() * 15,
                        seed: Math.random() * 100 // for variety in shape
                    });
                }
            },
            drawTree(ctx, x, y, size) {
                ctx.save();
                ctx.translate(x, y);
                // Trunk
                ctx.beginPath();
                ctx.moveTo(-2, 0);
                ctx.quadraticCurveTo(-2, -size/2, -1, -size);
                ctx.lineTo(1, -size);
                ctx.quadraticCurveTo(2, -size/2, 2, 0);
                ctx.fill();

                // Detailed Foliage (Jagged Cloud Shape)
                ctx.beginPath();
                for (let i = 0; i < 8; i++) {
                    const angle = (i / 8) * Math.PI * 2;
                    const r = (size * 0.6) + (Math.sin(i * 1.5) * 5);
                    const lx = Math.cos(angle) * r;
                    const ly = Math.sin(angle) * r - size;
                    if (i === 0) ctx.moveTo(lx, ly);
                    else ctx.lineTo(lx, ly);
                }
                ctx.closePath();
                ctx.fill();
                ctx.restore();
                
                // Chance to spawn leaf from this tree
                if (Math.random() < 0.02) Particles.spawn(x, y - size);
            },
            drawBush(ctx, x, y, size) {
                ctx.save();
                ctx.translate(x, y);
                ctx.beginPath();
                for (let i = 0; i < 6; i++) {
                    const bx = Math.cos(i) * (size * 0.5);
                    const by = Math.sin(i) * (size * 0.3);
                    ctx.arc(bx, by - 5, size/2, 0, Math.PI * 2);
                }
                ctx.fill();
                ctx.restore();
            },
            draw(ctx, groundY, viewOffset) {
                ctx.fillStyle = "#000";
                this.list.forEach(item => {
                    if (item.type === 'tree') {
                        this.drawTree(ctx, item.x, groundY, item.size);
                    } else {
                        this.drawBush(ctx, item.x, groundY, item.size);
                    }
                });
            }
        };

        /** 
         * MAIN GAME LOGIC 
         */
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const gameOverEl = document.getElementById('game-over');

        let platforms = [];
        let player = { x: 0, y: 0, targetX: 0, isMoving: false, rotation: 0 };
        let bridge = { length: 0, angle: 0, isActive: false, isDropping: false };
        let score = 0;
        let gameActive = true;
        let viewOffset = 0;
        let targetViewOffset = 0;
        let groundY = 0;

        function init() {
            window.addEventListener('resize', resize);
            resize();
            
            const handleStart = (e) => {
                if (!gameActive || player.isMoving || bridge.isDropping) return;
                bridge.isActive = true;
            };
            const handleEnd = () => {
                if (bridge.isActive) {
                    bridge.isActive = false;
                    bridge.isDropping = true;
                }
            };

            window.addEventListener('touchstart', handleStart);
            window.addEventListener('touchend', handleEnd);
            // Mouse support for testing
            window.addEventListener('mousedown', handleStart);
            window.addEventListener('mouseup', handleEnd);

            resetGame();
            requestAnimationFrame(gameLoop);
        }

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            groundY = canvas.height * 0.7;
        }

        function resetGame() {
            score = 0;
            scoreEl.innerText = score;
            gameActive = true;
            gameOverEl.style.display = 'none';
            viewOffset = 0;
            targetViewOffset = 0;
            Details.list = [];
            Particles.list = [];

            platforms = [
                { x: 50, w: 120 },
                { x: 350, w: 100 }
            ];

            Details.generate(50, 120);
            Details.generate(350, 100);

            player.x = platforms[0].x + platforms[0].w - 30;
            player.y = groundY - 20;
            player.isMoving = false;
            bridge = { length: 0, angle: 0, isActive: false, isDropping: false };
        }

        function update() {
            if (!gameActive) return;

            viewOffset += (targetViewOffset - viewOffset) * 0.1;
            Particles.update();

            if (bridge.isActive) {
                bridge.length += 6;
            }

            if (bridge.isDropping) {
                bridge.angle += 10;
                if (bridge.angle >= 90) {
                    bridge.angle = 90;
                    bridge.isDropping = false;
                    checkLanding();
                }
            }

            if (player.isMoving) {
                player.x += 7;
                if (player.x >= player.targetX) {
                    player.x = player.targetX;
                    player.isMoving = false;
                    
                    score++;
                    scoreEl.innerText = score;
                    platforms.shift();
                    
                    const last = platforms[platforms.length-1];
                    const nextX = last.x + last.w + 60 + Math.random() * 200;
                    const nextW = 50 + Math.random() * 100;
                    platforms.push({ x: nextX, w: nextW });
                    Details.generate(nextX, nextW);

                    targetViewOffset = platforms[0].x - 50;
                    bridge = { length: 0, angle: 0, isActive: false, isDropping: false };
                }
            }
        }

        function checkLanding() {
            const bridgeEnd = platforms[0].x + platforms[0].w + bridge.length;
            const next = platforms[1];

            if (bridgeEnd >= next.x && bridgeEnd <= next.x + next.w) {
                player.targetX = next.x + next.w - 30;
                player.isMoving = true;
            } else {
                setTimeout(() => {
                    gameActive = false;
                    gameOverEl.style.display = 'block';
                }, 400);
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Draw Particles (Leaves)
            Particles.draw(ctx, viewOffset);

            ctx.save();
            ctx.translate(-viewOffset, 0);

            // Draw Background Assets
            Details.draw(ctx, groundY, viewOffset);

            // Draw Curvy Terrain
            ctx.fillStyle = "#000";
            ctx.beginPath();
            ctx.moveTo(platforms[0].x - 500, canvas.height);
            
            platforms.forEach((p, i) => {
                ctx.lineTo(p.x, groundY);
                ctx.lineTo(p.x + p.w, groundY);
                
                const next = platforms[i+1];
                if (next) {
                    const midX = (p.x + p.w + next.x) / 2;
                    ctx.bezierCurveTo(p.x + p.w + 30, groundY, midX, groundY + 120, next.x, groundY);
                }
            });

            ctx.lineTo(platforms[platforms.length-1].x + 1000, canvas.height);
            ctx.fill();

            // Draw Bridge
            if (bridge.length > 0) {
                ctx.save();
                ctx.translate(platforms[0].x + platforms[0].w, groundY);
                ctx.rotate(bridge.angle * Math.PI / 180);
                // Detail on bridge: slight rounded end
                ctx.fillRect(-3, -bridge.length, 6, bridge.length);
                ctx.restore();
            }

            // Draw Player (Small Silhouette)
            ctx.fillRect(player.x, player.y, 20, 20);

            ctx.restore();
        }

        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        init();
    </script>
</body>
</html>
