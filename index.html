<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Shadow Bridge: Cinematic</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #dcdcdc; touch-action: none; }
        #ui { position: absolute; top: 5%; width: 100%; text-align: center; pointer-events: none; z-index: 100; }
        #score { font-size: 100px; font-weight: 900; color: rgba(0, 0, 0, 0.15); font-family: sans-serif; }
        canvas { display: block; transition: filter 0.1s linear; } /* Smooth motion blur transition */
    </style>
</head>
<body>
    <div id="ui"><div id="score">0</div></div>
    <canvas id="gameCanvas"></canvas>

    <!-- LOAD THE NEW SCRIPT -->
    <script src="effects.js"></script> 

    <script>
        /* RE-USE YOUR PREVIOUS TREE GENERATOR HERE */
        // ... (Include the TreeGenerator and State logic from the previous answer) ...

        // MODIFIED DRAW FUNCTION
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 1. Draw Depth of Field Background (Blurred)
            PostProcessing.drawBackground(ctx, state);

            // 2. Gameplay Layer
            ctx.save();
            ctx.translate(-state.viewOffset, 0);
            
            // Draw original trees (In Focus)
            state.decor.forEach(d => {
                const w = d.img.width * d.scale;
                const h = d.img.height * d.scale;
                ctx.drawImage(d.img, d.x - w/2, state.groundY - h, w, h);
            });

            // Draw Terrain
            ctx.fillStyle = "black";
            ctx.beginPath();
            // ... (Your previous curvy terrain logic) ...
            ctx.fill();

            // Draw Player & Bridge
            // ... (Your previous player/bridge logic) ...
            
            ctx.restore();

            // 3. Draw Foreground (Out of Focus / Close to Camera)
            PostProcessing.drawForeground(ctx, state);

            // 4. Apply Motion Blur based on movement
            PostProcessing.applyMotionBlur(ctx, state);
        }

        // MODIFIED ADD DECOR FUNCTION
        function addDecor(x, w) {
            // Add to main gameplay layer
            const count = Math.floor(Math.random() * 2) + 1;
            for (let i = 0; i < count; i++) {
                state.decor.push({
                    x: x + (Math.random() * (w - 40)),
                    img: TreeGenerator.cache[Math.floor(Math.random() * TreeGenerator.cache.length)],
                    scale: 0.6 + Math.random() * 0.5
                });
            }
            // Add to Parallax Layers
            PostProcessing.addDecorToLayers(x);
        }

        // ... (Rest of gameLoop and update logic) ...
    </script>
</body>
</html>
