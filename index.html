<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hot Fuse: The Dating Sim</title>
    <style>
        :root {
            --neon-pink: #ff00ff;
            --neon-blue: #00ffff;
            --danger: #ff3333;
        }

        body {
            background-color: #0a0a0a;
            color: white;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        #game-window {
            width: 400px;
            background: #1a1a1a;
            border: 3px solid var(--neon-blue);
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 0 20px var(--neon-blue);
        }

        .stats {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            font-family: monospace;
        }

        #timer { font-size: 1.5rem; color: var(--danger); }

        #character-sprite {
            font-size: 80px;
            height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 10px 0;
            transition: transform 0.2s;
        }

        .dialogue {
            background: #000;
            padding: 15px;
            border-radius: 10px;
            min-height: 60px;
            margin-bottom: 20px;
            border-left: 4px solid var(--neon-pink);
        }

        .btn {
            width: 100%;
            padding: 10px;
            margin: 5px 0;
            background: transparent;
            border: 1px solid var(--neon-blue);
            color: var(--neon-blue);
            cursor: pointer;
            border-radius: 5px;
        }

        .btn:hover { background: rgba(0, 255, 255, 0.1); }

        .hidden { display: none; }
    </style>
</head>
<body>

<div id="game-window">
    <!-- Character Select -->
    <div id="selector">
        <h3>Choose Your Date</h3>
        <button class="btn" onclick="startGame('emanuel')">Emanuel (The Sensitive Soul)</button>
        <button class="btn" onclick="startGame('bot')">B-0-T (The Cold Tsundere)</button>
        <button class="btn" onclick="startGame('sparky')">Sparky (The Wild Child)</button>
    </div>

    <!-- Main Game -->
    <div id="game-ui" class="hidden">
        <div class="stats">
            <span id="char-name">NAME</span>
            <span id="timer">30.00</span>
        </div>
        <div id="character-sprite">💣</div>
        <div id="dialogue-box" class="dialogue">...</div>
        <div id="choice-container"></div>
    </div>
</div>

<script>
    const data = {
        emanuel: {
            name: "Emanuel",
            sprite: "💎💣",
            startText: "I... I hope you don't mind that I'm ticking. It's just my heart.",
            scenes: [
                { text: "Do you like the way my casing glitters in this light?", 
                  choices: [
                    { t: "It's breathtaking.", s: -10, next: 1 },
                    { t: "Focus on the wires, Emanuel.", s: 15, next: 1 }
                  ]
                }
            ]
        },
        bot: {
            name: "B-0-T",
            sprite: "🤖🧨",
            startText: "Don't touch my keypad unless you know what you're doing, human.",
            scenes: [
                { text: "My logic circuits are overheating. State your purpose.", 
                  choices: [
                    { t: "I'm here to hack your heart.", s: -10, next: 1 },
                    { t: "Just disarm already.", s: 20, next: 1 }
                  ]
                }
            ]
        },
        sparky: {
            name: "Sparky",
            sprite: "⚡🧨",
            startText: "Wanna see something really bright?! I'm ready to blow!",
            scenes: [
                { text: "Let's make this night go out with a bang!", 
                  choices: [
                    { t: "Let's keep it a slow burn.", s: -15, next: 1 },
                    { t: "I love a man with a short fuse.", s: 10, next: 1 }
                  ]
                }
            ]
        }
    };

    let activeChar = null;
    let timeLeft = 30.00;
    let timerInterval;

    function startGame(key) {
        activeChar = data[key];
        document.getElementById('selector').classList.add('hidden');
        document.getElementById('game-ui').classList.remove('hidden');
        document.getElementById('char-name').textContent = activeChar.name;
        document.getElementById('character-sprite').textContent = activeChar.sprite;
        document.getElementById('dialogue-box').textContent = activeChar.startText;
        
        renderChoices(0);
        startTimer();
    }

    function renderChoices(sceneIdx) {
        const container = document.getElementById('choice-container');
        container.innerHTML = '';
        const scene = activeChar.scenes[sceneIdx] || { choices: [{t: "Ask for a second date", s: -100, win: true}] };

        scene.choices.forEach(c => {
            const b = document.createElement('button');
            b.className = 'btn';
            b.textContent = c.t;
            b.onclick = () => {
                timeLeft -= c.s; // Negative stress adds time!
                if(c.win) { end(true); }
                else { 
                    document.getElementById('dialogue-box').textContent = "That... that felt interesting.";
                    renderChoices(sceneIdx + 1); 
                }
            };
            container.appendChild(b);
        });
    }

    function startTimer() {
        timerInterval = setInterval(() => {
            timeLeft -= 0.01;
            document.getElementById('timer').textContent = timeLeft.toFixed(2);
            if(timeLeft <= 0) end(false);
        }, 10);
    }

    function end(win) {
        clearInterval(timerInterval);
        if(win) {
            document.getElementById('dialogue-box').textContent = "Safe! You really know how to handle a fuse.";
            document.getElementById('character-sprite').textContent = "💖";
        } else {
            document.getElementById('dialogue-box').textContent = "BOOM! Too much pressure!";
            document.body.style.background = "red";
        }
    }
</script>
</body>
</html>
