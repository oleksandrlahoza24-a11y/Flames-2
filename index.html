<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Shadow Bridge: Wilds</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #d1d1d1; }
        #ui { position: absolute; top: 40px; width: 100%; text-align: center; pointer-events: none; z-index: 10; font-family: sans-serif; }
        #score { font-size: 80px; font-weight: 900; color: rgba(0, 0, 0, 0.1); }
        #game-over { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; display: none; z-index: 20; font-family: sans-serif; }
        button { padding: 15px 40px; font-size: 20px; background: #000; color: #fff; border: none; border-radius: 30px; }
        canvas { display: block; touch-action: none; }
    </style>
</head>
<body>
    <div id="ui">
        <div id="score">0</div>
    </div>
    <div id="game-over">
        <h1 style="font-size: 48px;">LOST IN SHADOW</h1>
        <button onclick="resetGame()">Try Again</button>
    </div>
    <canvas id="gameCanvas"></canvas>

    <!-- Load scripts in order -->
    <script src="terrainDetails.js"></script>
    <script src="graphics.js"></script>
    <script src="terrain.js"></script>
</body>
</html>
