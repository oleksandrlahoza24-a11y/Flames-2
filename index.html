<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pixel World Pro</title>
    <style>
        body { margin: 0; padding: 0; background-color: #2c3e50; overflow: hidden; font-family: 'Courier New', Courier, monospace; touch-action: none; user-select: none; }
        canvas { display: block; image-rendering: pixelated; }
        
        /* UI Overlay */
        #ui {
            position: fixed;
            top: 10px;
            left: 10px;
            color: white;
            background: rgba(0,0,0,0.5);
            padding: 10px;
            border-radius: 5px;
            pointer-events: none;
        }

        /* Improved D-PAD */
        #dpad {
            position: fixed;
            bottom: 30px;
            left: 30px; /* Moved to left for better ergonomics */
            display: grid;
            grid-template-columns: repeat(3, 65px);
            grid-template-rows: repeat(2, 65px);
            gap: 8px;
            z-index: 10;
        }
        .dbtn {
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: 2px solid rgba(255,255,255,0.5);
            border-radius: 15px;
            font-size: 24px;
            display: flex;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(5px);
        }
        .dbtn:active { background: rgba(255, 255, 255, 0.5); transform: scale(0.95); }
        #btn-up { grid-column: 2; grid-row: 1; }
        #btn-left { grid-column: 1; grid-row: 2; }
        #btn-down { grid-column: 2; grid-row: 2; }
        #btn-right { grid-column: 3; grid-row: 2; }
    </style>
</head>
<body>

    <div id="ui">Coordinates: <span id="coords">0, 0</span></div>

    <canvas id="gameCanvas"></canvas>

    <div id="dpad">
        <div class="dbtn" id="btn-up">▲</div>
        <div class="dbtn" id="btn-left">◀</div>
        <div class="dbtn" id="btn-down">▼</div>
        <div class="dbtn" id="btn-right">▶</div>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const coordDisplay = document.getElementById("coords");

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        // ==========================================
        // 🌎 1. WORLD & CAMERA SETTINGS
        // ==========================================
        const WORLD = { width: 3000, height: 3000, color: "#7ec850" };
        const camera = { x: 0, y: 0 };
        
        const player = {
            x: 1500, y: 1500,
            w: 30, h: 45,
            speed: 5,
            color: "#e74c3c"
        };

        const keys = {};
        const entities = []; // All trees, rocks, etc.

        // ==========================================
        // 🌲 2. OBJECT GENERATOR
        // ==========================================
        function spawnEntities() {
            // Spawn Ponds (Large, non-collidable background)
            for(let i=0; i<15; i++) {
                entities.push({
                    type: 'pond',
                    x: Math.random() * WORLD.width,
                    y: Math.random() * WORLD.height,
                    w: 200 + Math.random() * 200,
                    h: 100 + Math.random() * 100,
                    color: '#3498db',
                    layer: 0 // Background layer
                });
            }

            // Spawn Trees and Rocks (Y-Sorted & Collidable)
            for(let i=0; i<120; i++) {
                const type = Math.random() > 0.2 ? 'tree' : 'rock';
                entities.push({
                    type: type,
                    x: Math.random() * WORLD.width,
                    y: Math.random() * WORLD.height,
                    size: 40 + Math.random() * 40,
                    color: type === 'tree' ? ['#27ae60', '#2ecc71', '#1e8449'][Math.floor(Math.random()*3)] : '#7f8c8d',
                    layer: 1 // Interaction layer
                });
            }
        }
        spawnEntities();

        // ==========================================
        // 🕹️ 3. INPUTS
        // ==========================================
        window.onkeydown = (e) => keys[e.key] = true;
        window.onkeyup = (e) => keys[e.key] = false;

        function bindDpad(id, key) {
            const el = document.getElementById(id);
            el.ontouchstart = (e) => { e.preventDefault(); keys[key] = true; };
            el.ontouchend = (e) => { e.preventDefault(); keys[key] = false; };
            el.onmousedown = () => keys[key] = true;
            el.onmouseup = () => keys[key] = false;
        }
        bindDpad("btn-up", "ArrowUp");
        bindDpad("btn-down", "ArrowDown");
        bindDpad("btn-left", "ArrowLeft");
        bindDpad("btn-right", "ArrowRight");

        // ==========================================
        // ⚙️ 4. PHYSICS & COLLISIONS
        // ==========================================
        function checkCollision(nx, ny) {
            // World Boundary Collision
            if (nx < 0 || nx + player.w > WORLD.width || ny < 0 || ny + player.h > WORLD.height) return true;

            // Object Collision (Check against Rocks and Tree Trunks)
            for (let ent of entities) {
                if (ent.type === 'pond') continue;
                
                // Define hitboxes (smaller than the visual sprite)
                const hit = { x: ent.x - 10, y: ent.y - 10, w: 20, h: 20 };
                if (ent.type === 'tree') { hit.y += 20; } // Tree collision is only at the trunk

                if (nx < hit.x + hit.w && nx + player.w > hit.x &&
                    ny < hit.y + hit.h && ny + player.h > hit.y) {
                    return true; 
                }
            }
            return false;
        }

        function update() {
            let nextX = player.x;
            let nextY = player.y;

            if (keys.ArrowUp || keys.w) nextY -= player.speed;
            if (keys.ArrowDown || keys.s) nextY += player.speed;
            if (keys.ArrowLeft || keys.a) nextX -= player.speed;
            if (keys.ArrowRight || keys.d) nextX += player.speed;

            // Move if no collision
            if (!checkCollision(nextX, player.y)) player.x = nextX;
            if (!checkCollision(player.x, nextY)) player.y = nextY;

            // Camera follow (center player)
            camera.x = player.x - canvas.width / 2;
            camera.y = player.y - canvas.height / 2;

            coordDisplay.innerText = `${Math.floor(player.x)}, ${Math.floor(player.y)}`;
        }

        // ==========================================
        // 🎨 5. RENDERING (Y-SORTING)
        // ==========================================
        function draw() {
            ctx.fillStyle = WORLD.color;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.save();
            ctx.translate(-camera.x, -camera.y);

            // Separate entities into layers
            const background = entities.filter(e => e.layer === 0);
            const sortedGroup = [
                ...entities.filter(e => e.layer === 1),
                { type: 'player', x: player.x, y: player.y, w: player.w, h: player.h }
            ].sort((a, b) => (a.y + (a.size || a.h)) - (b.y + (b.size || b.h)));

            // 1. Draw Background (Ponds)
            background.forEach(p => {
                ctx.fillStyle = p.color;
                ctx.beginPath();
                ctx.ellipse(p.x, p.y, p.w/2, p.h/2, 0, 0, Math.PI*2);
                ctx.fill();
            });

            // 2. Draw Sorted Entities (Trees/Player/Rocks)
            sortedGroup.forEach(e => {
                if (e.type === 'tree') {
                    // Trunk
                    ctx.fillStyle = '#5d4037';
                    ctx.fillRect(e.x - 5, e.y, 10, 20);
                    // Leaves
                    ctx.fillStyle = e.color;
                    ctx.beginPath();
                    ctx.arc(e.x, e.y - 10, e.size/2, 0, Math.PI * 2);
                    ctx.fill();
                } 
                else if (e.type === 'rock') {
                    ctx.fillStyle = e.color;
                    ctx.beginPath();
                    ctx.roundRect(e.x - 15, e.y - 10, 30, 20, 10);
                    ctx.fill();
                }
                else if (e.type === 'player') {
                    // Simple Shadow
                    ctx.fillStyle = 'rgba(0,0,0,0.2)';
                    ctx.beginPath();
                    ctx.ellipse(e.x + 15, e.y + 40, 15, 8, 0, 0, Math.PI*2);
                    ctx.fill();
                    // Player Body
                    ctx.fillStyle = player.color;
                    ctx.fillRect(e.x, e.y, e.w, e.h);
                    // Eyes (to see direction)
                    ctx.fillStyle = "white";
                    ctx.fillRect(e.x + 5, e.y + 10, 5, 5);
                    ctx.fillRect(e.x + 20, e.y + 10, 5, 5);
                }
            });

            ctx.restore();
        }

        function loop() {
            update();
            draw();
            requestAnimationFrame(loop);
        }
        loop();
    </script>
</body>
</html>
