<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Shadow Bridge: Rainy Silhouette</title>
    <style>
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            overflow: hidden; background-color: #333; 
            user-select: none; -webkit-user-select: none; touch-action: none;
        }
        #ui { 
            position: absolute; top: 5%; width: 100%; 
            text-align: center; pointer-events: none; z-index: 10; 
            font-family: 'Segoe UI', sans-serif;
        }
        #score { font-size: 100px; font-weight: 900; color: rgba(255, 255, 255, 0.1); }
        #game-over { 
            position: absolute; top: 50%; left: 50%; 
            transform: translate(-50%, -50%); text-align: center; 
            display: none; z-index: 20; background: rgba(0,0,0,0.8);
            padding: 50px; border-radius: 20px; color: white;
            border: 1px solid rgba(255,255,255,0.2);
        }
        button { 
            padding: 15px 40px; font-size: 20px; background: #fff; 
            color: #000; border: none; border-radius: 50px; font-weight: bold; cursor: pointer;
        }
        canvas { display: block; }
    </style>
</head>
<body>

    <div id="ui"><div id="score">0</div></div>
    <div id="game-over">
        <h1 style="font-size: 50px; margin-bottom: 20px;">LOST IN RAIN</h1>
        <button onclick="resetGame()">RESTART</button>
    </div>
    <canvas id="gameCanvas"></canvas>

    <script>
        const TreeGenerator = {
            cache: [],
            init() {
                for(let i = 0; i < 15; i++) {
                    const canvas = document.createElement('canvas');
                    canvas.width = 300; canvas.height = 400;
                    const ctx = canvas.getContext('2d');
                    ctx.fillStyle = "black";
                    ctx.lineCap = "round";
                    const type = i % 3;
                    // Draw starting from the bottom (400) to ensure no cut-off
                    if (type === 0) this.drawOak(ctx, 150, 400, 60, -Math.PI/2, 8);
                    else if (type === 1) this.drawPine(ctx, 150, 400, 90);
                    else this.drawGnarled(ctx, 150, 400, 50, -Math.PI/2, 7);
                    this.cache.push(canvas);
                }
            },
            drawOak(ctx, x, y, len, angle, depth) {
                if (depth === 0) return;
                const x2 = x + Math.cos(angle) * len;
                const y2 = y + Math.sin(angle) * len;
                ctx.lineWidth = depth * 2;
                ctx.beginPath(); ctx.moveTo(x, y); ctx.lineTo(x2, y2); ctx.stroke();
                if (depth < 5) {
                    for(let i=0; i<8; i++) {
                        ctx.beginPath();
                        ctx.arc(x2 + Math.random()*20-10, y2 + Math.random()*20-10, Math.random()*12 + 2, 0, Math.PI*2);
                        ctx.fill();
                    }
                }
                this.drawOak(ctx, x2, y2, len * 0.75, angle - 0.4 + Math.random()*0.3, depth - 1);
                this.drawOak(ctx, x2, y2, len * 0.75, angle + 0.4 - Math.random()*0.3, depth - 1);
            },
            drawPine(ctx, x, y, s) {
                ctx.fillRect(x-5, y-s*2.5, 10, s*2.5);
                for(let i=0; i<15; i++) {
                    const h = (i/15) * s * 2.5;
                    const w = (1 - (i/15)) * s + 20;
                    ctx.beginPath(); ctx.moveTo(x, y - h - 50); ctx.lineTo(x - w, y - h); ctx.lineTo(x + w, y - h); ctx.fill();
                }
            },
            drawGnarled(ctx, x, y, len, angle, depth) {
                if (depth === 0) return;
                const x2 = x + Math.cos(angle) * len;
                const y2 = y + Math.sin(angle) * len;
                ctx.lineWidth = depth * 3;
                ctx.beginPath(); ctx.moveTo(x, y); ctx.lineTo(x2, y2); ctx.stroke();
                this.drawGnarled(ctx, x2, y2, len * 0.8, angle - 0.6 + Math.random()*0.4, depth - 1);
                if(depth > 2) this.drawGnarled(ctx, x2, y2, len * 0.5, angle + 0.8, depth - 1);
            }
        };

        TreeGenerator.init();

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const gameOverEl = document.getElementById('game-over');

        let state = {
            platforms: [],
            decor: [],
            bgDecor: [],
            rain: [],
            isRaining: true,
            viewOffset: 0,
            targetViewOffset: 0,
            score: 0,
            gameActive: true,
            groundY: 0,
            player: { x: 0, y: 0, targetX: 0, moving: false, speed: 0 },
            bridge: { length: 0, angle: 0, active: false, dropping: false, speed: 0 }
        };

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            state.groundY = canvas.height * 0.75;
        }

        function resetGame() {
            state.score = 0;
            scoreEl.innerText = "0";
            state.gameActive = true;
            gameOverEl.style.display = 'none';
            state.viewOffset = 0;
            state.targetViewOffset = 0;
            state.decor = []; state.bgDecor = []; state.rain = [];

            state.platforms = [
                { x: 50, w: 200, puddle: { x: 40, w: 100 } }, 
                { x: 450, w: 150, puddle: { x: 30, w: 80 } }
            ];
            
            spawnDecor(state.platforms[0]);
            spawnDecor(state.platforms[1]);
            for(let i=0; i<10; i++) spawnBgDecor(Math.random() * canvas.width * 2);

            state.player.x = state.platforms[0].x + state.platforms[0].w - 40;
            state.player.y = state.groundY - 24;
            state.player.moving = false;
        }

        function spawnDecor(platform) {
            // Midground Trees
            const count = 1 + Math.floor(Math.random() * 2);
            for(let i=0; i<count; i++) {
                state.decor.push({
                    x: platform.x + (Math.random() * (platform.w - 40)) + 20,
                    img: TreeGenerator.cache[Math.floor(Math.random() * TreeGenerator.cache.length)],
                    scale: 0.35 + Math.random() * 0.2,
                    platformRef: platform // Tie to platform for reflection
                });
            }
        }

        function spawnBgDecor(x) {
            state.bgDecor.push({
                x: x,
                img: TreeGenerator.cache[Math.floor(Math.random() * TreeGenerator.cache.length)],
                scale: 0.2 + Math.random() * 0.2,
                parallax: 0.5
            });
        }

        function update() {
            if (!state.gameActive) return;

            state.viewOffset += (state.targetViewOffset - state.viewOffset) * 0.08;

            // Rain logic
            if (state.isRaining) {
                if (state.rain.length < 100) {
                    state.rain.push({
                        x: Math.random() * canvas.width + state.viewOffset,
                        y: -50,
                        s: 15 + Math.random() * 20
                    });
                }
            }
            state.rain.forEach((p, i) => {
                p.y += p.s;
                p.x += 2; // Wind
                if (p.y > canvas.height) {
                    p.y = -50;
                    p.x = Math.random() * canvas.width + state.viewOffset;
                }
            });

            if (state.bridge.active) state.bridge.length += 7;
            if (state.bridge.dropping) {
                state.bridge.speed += 1.2;
                state.bridge.angle += state.bridge.speed;
                if (state.bridge.angle >= 90) {
                    state.bridge.angle = 90;
                    state.bridge.dropping = false;
                    state.bridge.speed = 0;
                    checkLanding();
                }
            }

            if (state.player.moving) {
                state.player.speed = 8;
                state.player.x += state.player.speed;
                if (state.player.x >= state.player.targetX) {
                    state.player.x = state.player.targetX;
                    state.player.moving = false;
                    state.score++;
                    scoreEl.innerText = state.score;
                    
                    state.platforms.shift();
                    const last = state.platforms[0];
                    const nextX = last.x + last.w + 100 + Math.random() * 250;
                    const nextW = 80 + Math.random() * 120;
                    const newPlatform = { 
                        x: nextX, w: nextW, 
                        puddle: Math.random() > 0.3 ? { x: Math.random()*(nextW-60), w: 40+Math.random()*40 } : null 
                    };
                    state.platforms.push(newPlatform);
                    spawnDecor(newPlatform);
                    spawnBgDecor(nextX + 600);
                    
                    state.targetViewOffset = state.platforms[0].x - 50;
                    state.bridge = { length: 0, angle: 0, active: false, dropping: false, speed: 0 };
                    state.isRaining = Math.random() > 0.2; // Toggle weather
                }
            }
        }

        function checkLanding() {
            const bridgeEnd = state.platforms[0].x + state.platforms[0].w + state.bridge.length;
            const next = state.platforms[1];
            if (bridgeEnd >= next.x && bridgeEnd <= next.x + next.w) {
                state.player.targetX = next.x + next.w - 40;
                state.player.moving = true;
            } else {
                setTimeout(() => { state.gameActive = false; gameOverEl.style.display = 'block'; }, 400);
            }
        }

        function draw() {
            // Sky
            const sky = ctx.createLinearGradient(0, 0, 0, canvas.height);
            sky.addColorStop(0, state.isRaining ? "#1a1a1a" : "#444");
            sky.addColorStop(1, state.isRaining ? "#333" : "#777");
            ctx.fillStyle = sky;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Background Trees (Far Depth of Field)
            ctx.filter = "blur(5px)";
            state.bgDecor.forEach(d => {
                const x = d.x - (state.viewOffset * d.parallax);
                ctx.globalAlpha = 0.2;
                ctx.drawImage(d.img, x, state.groundY - (d.img.height * d.scale) + 10, d.img.width * d.scale, d.img.height * d.scale);
            });
            ctx.filter = "none";
            ctx.globalAlpha = 1.0;

            ctx.save();
            ctx.translate(-state.viewOffset, 0);

            // Draw Reflections in Puddles
            state.platforms.forEach(p => {
                if (p.puddle) {
                    ctx.save();
                    // Draw puddle shape as clipping mask
                    ctx.beginPath();
                    ctx.ellipse(p.x + p.puddle.x + p.puddle.w/2, state.groundY + 2, p.puddle.w/2, 8, 0, 0, Math.PI*2);
                    ctx.clip();
                    
                    // Draw flipped trees
                    ctx.save();
                    ctx.scale(1, -0.4); // Squashed reflection
                    ctx.translate(0, -state.groundY * 2.5);
                    ctx.globalAlpha = 0.3;
                    state.decor.filter(d => d.platformRef === p).forEach(d => {
                        const w = d.img.width * d.scale;
                        const h = d.img.height * d.scale;
                        ctx.drawImage(d.img, d.x - w/2, state.groundY - h + 10, w, h);
                    });
                    // Flipped Player
                    ctx.fillRect(state.player.x, state.player.y, 24, 24);
                    ctx.restore();
                    
                    // Puddle Tint
                    ctx.fillStyle = "rgba(255,255,255,0.1)";
                    ctx.fill();
                    ctx.restore();
                }
            });

            // Draw Main Decor (Midground - Sharp)
            state.decor.forEach(d => {
                const w = d.img.width * d.scale;
                const h = d.img.height * d.scale;
                // Tree Trunk grounded logic: y = groundY - height + small offset
                ctx.drawImage(d.img, d.x - w/2, state.groundY - h + 10, w, h);
            });

            // Bridge
            ctx.fillStyle = "black";
            if (state.bridge.length > 0) {
                ctx.save();
                ctx.translate(state.platforms[0].x + state.platforms[0].w, state.groundY);
                ctx.rotate(state.bridge.angle * Math.PI / 180);
                ctx.fillRect(-3, -state.bridge.length, 6, state.bridge.length);
                ctx.restore();
            }

            // Platforms
            ctx.beginPath();
            ctx.moveTo(state.platforms[0].x - 100, canvas.height);
            state.platforms.forEach((p, i) => {
                ctx.lineTo(p.x, state.groundY);
                ctx.lineTo(p.x + p.w, state.groundY);
                const next = state.platforms[i + 1];
                if (next) {
                    const midX = (p.x + p.w + next.x) / 2;
                    ctx.bezierCurveTo(p.x + p.w + 50, state.groundY, midX, state.groundY + 100, next.x, state.groundY);
                }
            });
            ctx.lineTo(state.platforms[state.platforms.length - 1].x + 1000, canvas.height);
            ctx.fill();

            // Player with slight speed blur
            if (state.player.moving) {
                ctx.globalAlpha = 0.5;
                ctx.fillRect(state.player.x - 10, state.player.y, 24, 24);
                ctx.globalAlpha = 1.0;
            }
            ctx.fillRect(state.player.x, state.player.y, 24, 24);

            ctx.restore();

            // Rain Layer (Top Layer with Motion Blur)
            ctx.strokeStyle = "rgba(255,255,255,0.2)";
            ctx.lineWidth = 1;
            state.rain.forEach(r => {
                ctx.beginPath();
                ctx.moveTo(r.x - state.viewOffset, r.y);
                ctx.lineTo(r.x - state.viewOffset + 2, r.y + r.s); // Motion blur line
                ctx.stroke();
            });
        }

        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        // Input
        const start = () => { if (state.gameActive && !state.player.moving && !state.bridge.dropping) state.bridge.active = true; };
        const end = () => { if (state.bridge.active) { state.bridge.active = false; state.bridge.dropping = true; } };
        
        window.addEventListener('touchstart', start); window.addEventListener('touchend', end);
        window.addEventListener('mousedown', start); window.addEventListener('mouseup', end);
        window.addEventListener('resize', resize);
        
        resize();
        resetGame();
        gameLoop();
    </script>
</body>
</html>
