<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Date with Emanuel</title>
    <style>
        :root {
            --heart-pink: #ff4d6d;
            --danger-red: #ff0000;
            --lcd-blue: #00d4ff;
        }

        body {
            background-color: #1a1a1a;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        #game-container {
            width: 450px;
            background: #2d2d2d;
            border-radius: 20px;
            border: 4px solid var(--heart-pink);
            padding: 20px;
            box-shadow: 0 0 30px rgba(255, 77, 109, 0.3);
            text-align: center;
        }

        #emanuel-sprite {
            font-size: 80px;
            margin: 20px 0;
            transition: transform 0.3s;
            display: block;
        }

        .timer-panel {
            background: #000;
            border: 2px solid var(--lcd-blue);
            padding: 10px;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        #timer {
            font-family: 'Courier New', monospace;
            font-size: 2.5rem;
            color: var(--lcd-blue);
            margin: 0;
        }

        #dialogue-box {
            background: rgba(255, 255, 255, 0.1);
            padding: 15px;
            border-radius: 10px;
            min-height: 80px;
            margin-bottom: 20px;
            font-style: italic;
        }

        .choice-btn {
            display: block;
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background: transparent;
            border: 2px solid var(--heart-pink);
            color: white;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.9rem;
        }

        .choice-btn:hover {
            background: var(--heart-pink);
            transform: scale(1.02);
        }

        .stress-bar-bg {
            width: 100%;
            height: 10px;
            background: #444;
            border-radius: 5px;
            margin-top: 10px;
        }

        #stress-bar-fill {
            width: 20%;
            height: 100%;
            background: var(--danger-red);
            border-radius: 5px;
            transition: width 0.5s;
        }
    </style>
</head>
<body>

<div id="game-container">
    <div class="timer-panel">
        <div id="timer">01:00.00</div>
        <div class="stress-bar-bg"><div id="stress-bar-fill"></div></div>
        <small style="color: #888;">EMANUEL'S ANXIETY</small>
    </div>

    <div id="emanuel-sprite">💣</div>
    
    <div id="dialogue-box">
        "I... I just feel like nobody listens to me. They only care about my fuse."
    </div>

    <div id="choices">
        <!-- Choices injected by JS -->
    </div>
</div>

<script>
    let timeLeft = 60.00;
    let stress = 20;
    let currentScene = 0;
    let gameActive = true;

    const scenes = [
        {
            text: "Emanuel looks at you nervously. 'Do you think I'm... explosive? Is that why you're here?'",
            choices: [
                { text: "I'm here for your personality, not your payload.", stressChange: -10, next: 1 },
                { text: "Well, you are pretty hot-headed.", stressChange: 20, next: 1 },
                { text: "I just like dangerous guys.", stressChange: 5, next: 1 }
            ]
        },
        {
            text: "'Really? Most people just run away when I start ticking...' His fuse glows slightly purple.",
            choices: [
                { text: "Hold his hand (carefully).", stressChange: -15, next: 2 },
                { text: "Check how much time is left on his display.", stressChange: 30, next: 2 },
                { text: "Tell him a joke about wires.", stressChange: 0, next: 2 }
            ]
        },
        {
            text: "'I think... I think I'm starting to trust you. Should I stop the countdown?'",
            choices: [
                { text: "Yes, let's just enjoy the evening.", stressChange: -50, next: 'win' },
                { text: "Wait, I like the thrill!", stressChange: 40, next: 2 },
                { text: "Only if you want to, Emanuel.", stressChange: -20, next: 'win' }
            ]
        }
    ];

    const timerEl = document.getElementById('timer');
    const stressEl = document.getElementById('stress-bar-fill');
    const dialogueEl = document.getElementById('dialogue-box');
    const choicesEl = document.getElementById('choices');
    const spriteEl = document.getElementById('emanuel-sprite');

    function renderScene() {
        const scene = scenes[currentScene];
        dialogueEl.textContent = `"${scene.text}"`;
        choicesEl.innerHTML = '';
        
        scene.choices.forEach(choice => {
            const btn = document.createElement('button');
            btn.className = 'choice-btn';
            btn.textContent = choice.text;
            btn.onclick = () => makeChoice(choice);
            choicesEl.appendChild(btn);
        });
    }

    function makeChoice(choice) {
        stress = Math.max(0, stress + choice.stressChange);
        stressEl.style.width = stress + '%';
        
        if (stress >= 100) {
            triggerEnd(false, "You stressed him out too much!");
            return;
        }

        if (choice.next === 'win') {
            triggerEnd(true);
        } else {
            currentScene = choice.next;
            renderScene();
        }
    }

    const clock = setInterval(() => {
        if (!gameActive) return;

        // Higher stress makes time move faster
        const multiplier = 1 + (stress / 100);
        timeLeft -= (0.01 * multiplier);
        
        timerEl.textContent = (timeLeft > 0 ? timeLeft : 0).toFixed(2);

        if (timeLeft <= 0) {
            triggerEnd(false, "Time ran out!");
        }
    }, 10);

    function triggerEnd(success, reason) {
        gameActive = false;
        clearInterval(clock);
        choicesEl.innerHTML = '';

        if (success) {
            spriteEl.textContent = '💝';
            dialogueEl.textContent = "Emanuel clicks safely. 'You're different. Let's get out of here.'";
            timerEl.textContent = "SAFE";
            timerEl.style.color = "var(--heart-pink)";
        } else {
            spriteEl.textContent = '💥';
            dialogueEl.textContent = `BOOM! ${reason}`;
            document.body.style.background = "var(--danger-red)";
            alert("Game Over: " + reason);
            location.reload();
        }
    }

    renderScene();
</script>

</body>
</html>
