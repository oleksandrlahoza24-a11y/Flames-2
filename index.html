<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Shadow Bridge: Enhanced Edition</title>
    <style>
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            overflow: hidden; background-color: #d1d1d1; 
            user-select: none; -webkit-user-select: none; touch-action: none;
        }
        #ui { 
            position: absolute; top: 5%; width: 100%; 
            text-align: center; pointer-events: none; z-index: 10; 
            font-family: -apple-system, sans-serif;
        }
        #score { font-size: 100px; font-weight: 900; color: rgba(0, 0, 0, 0.15); }
        #game-over { 
            position: absolute; top: 50%; left: 50%; 
            transform: translate(-50%, -50%); text-align: center; 
            display: none; z-index: 20; background: rgba(255,255,255,0.9);
            padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        button { 
            padding: 20px 50px; font-size: 25px; background: #000; 
            color: #fff; border: none; border-radius: 50px; font-weight: bold; cursor: pointer;
        }
        canvas { display: block; }
    </style>
</head>
<body>

    <div id="ui"><div id="score">0</div></div>
    <div id="game-over">
        <h1 style="font-family: sans-serif; font-size: 50px; margin-bottom: 20px; color: #000;">FALLEN</h1>
        <button onclick="resetGame()">TRY AGAIN</button>
    </div>
    <canvas id="gameCanvas"></canvas>

    <script>
        const TreeGenerator = {
            cache: [],
            init() {
                for(let i = 0; i < 15; i++) {
                    const canvas = document.createElement('canvas');
                    canvas.width = 200; canvas.height = 300;
                    const ctx = canvas.getContext('2d');
                    ctx.fillStyle = "black";
                    const type = i % 3;
                    if (type === 0) this.drawOak(ctx, 100, 280, 55, -Math.PI/2, 8);
                    else if (type === 1) this.drawPine(ctx, 100, 280, 80);
                    else this.drawGnarled(ctx, 100, 280, 45, -Math.PI/2, 7);
                    this.cache.push(canvas);
                }
            },
            drawOak(ctx, x, y, len, angle, depth) {
                if (depth === 0) return;
                const x2 = x + Math.cos(angle) * len;
                const y2 = y + Math.sin(angle) * len;
                ctx.lineWidth = depth * 1.8;
                ctx.beginPath(); ctx.moveTo(x, y); ctx.lineTo(x2, y2); ctx.stroke();
                if (depth < 4) {
                    for(let i=0; i<6; i++) {
                        ctx.beginPath();
                        ctx.arc(x2 + Math.random()*15-7.5, y2 + Math.random()*15-7.5, Math.random()*10 + 2, 0, Math.PI*2);
                        ctx.fill();
                    }
                }
                const sub = 2 + Math.floor(Math.random() * 2);
                for(let i=0; i<sub; i++) this.drawOak(ctx, x2, y2, len * 0.72, angle + (Math.random() - 0.5) * 1.2, depth - 1);
            },
            drawPine(ctx, x, y, s) {
                ctx.fillRect(x-4, y-s*2.5, 8, s*2.5);
                for(let i=0; i<15; i++) {
                    const h = (i/15) * s * 2.2;
                    const w = (1 - (i/15)) * s + 15;
                    ctx.beginPath(); ctx.moveTo(x, y - h - 40); ctx.lineTo(x - w, y - h); ctx.lineTo(x + w, y - h); ctx.fill();
                }
            },
            drawGnarled(ctx, x, y, len, angle, depth) {
                if (depth === 0) return;
                const x2 = x + Math.cos(angle) * len;
                const y2 = y + Math.sin(angle) * len;
                ctx.lineWidth = depth * 2.5;
                ctx.beginPath(); ctx.moveTo(x, y); ctx.lineTo(x2, y2); ctx.stroke();
                this.drawGnarled(ctx, x2, y2, len * 0.8, angle - 0.5 + Math.random()*0.3, depth - 1);
                if(Math.random() > 0.4) this.drawGnarled(ctx, x2, y2, len * 0.6, angle + 0.6 + Math.random()*0.3, depth - 1);
            }
        };

        TreeGenerator.init();

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const gameOverEl = document.getElementById('game-over');

        let state = {
            platforms: [],
            decor: [],       // Midground (Sharp)
            bgDecor: [],     // Far (Blurred)
            fgDecor: [],     // Close (Blurred)
            particles: [],
            player: { x: 0, y: 0, targetX: 0, moving: false, speed: 0 },
            bridge: { length: 0, angle: 0, active: false, dropping: false, speed: 0 },
            viewOffset: 0,
            targetViewOffset: 0,
            score: 0,
            gameActive: true,
            groundY: 0
        };

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            state.groundY = canvas.height * 0.75;
        }

        function resetGame() {
            state.score = 0;
            scoreEl.innerText = "0";
            state.gameActive = true;
            gameOverEl.style.display = 'none';
            state.viewOffset = 0;
            state.targetViewOffset = 0;
            state.decor = []; state.bgDecor = []; state.fgDecor = []; state.particles = [];

            state.platforms = [{ x: 50, w: 150 }, { x: 450, w: 120 }];
            
            // Initial decor
            addDecor(50, 150); addDecor(450, 120);
            for(let i=0; i<10; i++) spawnBackgroundDecor(Math.random() * canvas.width * 2);

            state.player.x = state.platforms[0].x + state.platforms[0].w - 40;
            state.player.y = state.groundY - 22;
            state.player.moving = false;
            state.bridge = { length: 0, angle: 0, active: false, dropping: false, speed: 0 };
        }

        function addDecor(x, w) {
            // Midground trees (On Platforms)
            const count = Math.floor(Math.random() * 2) + 1;
            for (let i = 0; i < count; i++) {
                state.decor.push({
                    x: x + 20 + (Math.random() * (w - 40)),
                    img: TreeGenerator.cache[Math.floor(Math.random() * TreeGenerator.cache.length)],
                    scale: 0.4 + Math.random() * 0.3
                });
            }
            // Add some foreground "Depth of Field" elements
            if(Math.random() > 0.5) {
                state.fgDecor.push({
                    x: x + Math.random() * 400,
                    img: TreeGenerator.cache[Math.floor(Math.random() * TreeGenerator.cache.length)],
                    scale: 1.5 + Math.random() * 1.0
                });
            }
        }

        function spawnBackgroundDecor(x) {
            state.bgDecor.push({
                x: x,
                img: TreeGenerator.cache[Math.floor(Math.random() * TreeGenerator.cache.length)],
                scale: 0.2 + Math.random() * 0.3,
                parallax: 0.4 + Math.random() * 0.3
            });
        }

        function update() {
            if (!state.gameActive) return;

            const prevViewOffset = state.viewOffset;
            state.viewOffset += (state.targetViewOffset - state.viewOffset) * 0.08;
            const scrollSpeed = state.viewOffset - prevViewOffset;

            if (state.bridge.active) {
                state.bridge.length += 8;
            }
            
            if (state.bridge.dropping) {
                state.bridge.speed += 1.5;
                state.bridge.angle += state.bridge.speed;
                if (state.bridge.angle >= 90) {
                    state.bridge.angle = 90;
                    state.bridge.dropping = false;
                    state.bridge.speed = 0;
                    checkLanding();
                }
            }

            if (state.player.moving) {
                state.player.speed = 9;
                state.player.x += state.player.speed;
                if (state.player.x >= state.player.targetX) {
                    state.player.x = state.player.targetX;
                    state.player.moving = false;
                    state.player.speed = 0;
                    state.score++;
                    scoreEl.innerText = state.score;
                    
                    state.platforms.shift();
                    const last = state.platforms[0];
                    const nextX = last.x + last.w + 100 + Math.random() * 200;
                    const nextW = 60 + Math.random() * 100;
                    state.platforms.push({ x: nextX, w: nextW });
                    addDecor(nextX, nextW);
                    spawnBackgroundDecor(nextX + 500);
                    
                    state.targetViewOffset = state.platforms[0].x - 50;
                    state.bridge = { length: 0, angle: 0, active: false, dropping: false, speed: 0 };
                }
            }

            state.particles.forEach((p, i) => {
                p.y += p.vy;
                p.x += p.vx;
                if(p.y > canvas.height) state.particles.splice(i, 1);
            });
        }

        function checkLanding() {
            const bridgeEnd = state.platforms[0].x + state.platforms[0].w + state.bridge.length;
            const next = state.platforms[1];
            if (bridgeEnd >= next.x && bridgeEnd <= next.x + next.w) {
                state.player.targetX = next.x + next.w - 35;
                state.player.moving = true;
            } else {
                setTimeout(() => { state.gameActive = false; gameOverEl.style.display = 'block'; }, 400);
            }
        }

        function drawMotionBlurRect(x, y, w, h, speed, color) {
            for(let i = 0; i < 5; i++) {
                ctx.globalAlpha = 0.5 - (i * 0.1);
                ctx.fillStyle = color;
                ctx.fillRect(x - (i * speed * 0.5), y, w, h);
            }
            ctx.globalAlpha = 1.0;
        }

        function draw() {
            // Background Gradient (Atmospheric perspective)
            const grad = ctx.createLinearGradient(0, 0, 0, canvas.height);
            grad.addColorStop(0, "#ffffff");
            grad.addColorStop(1, "#c0c0c0");
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 1. BACKGROUND LAYER (Blurred Depth of Field)
            ctx.filter = "blur(4px) grayscale(0.5)";
            state.bgDecor.forEach(d => {
                const drawX = d.x - (state.viewOffset * d.parallax);
                const w = d.img.width * d.scale;
                const h = d.img.height * d.scale;
                ctx.globalAlpha = 0.3;
                ctx.drawImage(d.img, drawX, state.groundY - h + 10, w, h);
            });
            ctx.filter = "none";
            ctx.globalAlpha = 1.0;

            ctx.save();
            ctx.translate(-state.viewOffset, 0);

            // 2. MIDGROUND LAYER (Sharp - Game Level)
            
            // Terrain Shadows (Makes trees look grounded)
            state.decor.forEach(d => {
                const w = d.img.width * d.scale;
                const h = d.img.height * d.scale;
                // Shadow ellipse at base
                ctx.fillStyle = "rgba(0,0,0,0.1)";
                ctx.beginPath();
                ctx.ellipse(d.x, state.groundY, w/4, 5, 0, 0, Math.PI*2);
                ctx.fill();
                // The Tree
                ctx.drawImage(d.img, d.x - w/2, state.groundY - h + 5, w, h);
            });

            // Bridge with motion blur
            if (state.bridge.length > 0) {
                ctx.save();
                ctx.translate(state.platforms[0].x + state.platforms[0].w, state.groundY);
                ctx.rotate(state.bridge.angle * Math.PI / 180);
                
                if (state.bridge.dropping) {
                    for(let i=0; i<3; i++) {
                        ctx.globalAlpha = 0.3;
                        ctx.rotate(-(state.bridge.speed * 0.1 * Math.PI / 180));
                        ctx.fillStyle = "black";
                        ctx.fillRect(-3, -state.bridge.length, 6, state.bridge.length);
                    }
                    ctx.globalAlpha = 1.0;
                } else {
                    ctx.fillStyle = "black";
                    ctx.fillRect(-3, -state.bridge.length, 6, state.bridge.length);
                }
                ctx.restore();
            }

            // Platforms & Terrain
            ctx.fillStyle = "black";
            ctx.beginPath();
            ctx.moveTo(state.platforms[0].x - 500, canvas.height);
            state.platforms.forEach((p, i) => {
                ctx.lineTo(p.x, state.groundY);
                ctx.lineTo(p.x + p.w, state.groundY);
                const next = state.platforms[i + 1];
                if (next) {
                    const midX = (p.x + p.w + next.x) / 2;
                    ctx.bezierCurveTo(p.x + p.w + 40, state.groundY, midX, state.groundY + 150, next.x, state.groundY);
                }
            });
            ctx.lineTo(state.platforms[state.platforms.length - 1].x + 1000, canvas.height);
            ctx.fill();

            // Player with Motion Blur
            if (state.player.moving) {
                drawMotionBlurRect(state.player.x, state.player.y, 24, 24, state.player.speed, "black");
            } else {
                ctx.fillRect(state.player.x, state.player.y, 24, 24);
            }

            ctx.restore();

            // 3. FOREGROUND LAYER (Very Blurred Depth of Field)
            ctx.filter = "blur(12px)";
            state.fgDecor.forEach(d => {
                const drawX = (d.x - state.viewOffset * 1.8) % (canvas.width * 2);
                const w = d.img.width * d.scale;
                const h = d.img.height * d.scale;
                ctx.globalAlpha = 0.6;
                ctx.drawImage(d.img, drawX, canvas.height - h + 50, w, h);
            });
            ctx.filter = "none";
            ctx.globalAlpha = 1.0;
        }

        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        // Interaction
        const startEvent = (e) => { 
            if (state.gameActive && !state.player.moving && !state.bridge.dropping) state.bridge.active = true; 
        };
        const endEvent = () => { 
            if (state.bridge.active) { state.bridge.active = false; state.bridge.dropping = true; } 
        };

        window.addEventListener('touchstart', startEvent);
        window.addEventListener('touchend', endEvent);
        window.addEventListener('mousedown', startEvent);
        window.addEventListener('mouseup', endEvent);
        
        window.addEventListener('resize', resize);
        resize();
        resetGame();
        gameLoop();
    </script>
</body>
</html>
