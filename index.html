<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Grumpy Grove | Shop</title>
    <style>
        :root {
            --bg-color: #f4f4f9;
            --card-bg: #ffffff;
            --accent-color: #5a67d8;
            --text-main: #2d3748;
            --text-muted: #718096;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .product-card {
            background: var(--card-bg);
            width: 350px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            overflow: hidden;
            transition: transform 0.3s ease;
        }

        .product-card:hover {
            transform: translateY(-5px);
        }

        .image-container {
            background: #e2e8f0;
            height: 250px;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            font-size: 5rem;
        }

        .badge {
            position: absolute;
            top: 15px;
            right: 15px;
            background: #e53e3e;
            color: white;
            padding: 5px 12px;
            border-radius: 12px;
            font-size: 0.8rem;
            font-weight: bold;
        }

        .content {
            padding: 25px;
        }

        h1 {
            margin: 0;
            font-size: 1.5rem;
            color: var(--text-main);
        }

        .price {
            font-size: 1.25rem;
            font-weight: bold;
            color: var(--accent-color);
            margin: 10px 0;
        }

        .description {
            font-size: 0.95rem;
            color: var(--text-muted);
            line-height: 1.5;
            margin-bottom: 20px;
        }

        .buy-button {
            width: 100%;
            background-color: var(--accent-color);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        .buy-button:hover {
            background-color: #434190;
        }

        .warning {
            font-size: 0.7rem;
            text-align: center;
            margin-top: 15px;
            color: #a0aec0;
        }
    </style>
</head>
<body>

    <div class="product-card">
        <div class="image-container">
            <!-- Visual representation using Emoji -->
            🌲🔪
            <div class="badge">Limited Edition</div>
        </div>

        <div class="content">
            <h1>The Melancholy Oak</h1>
            <div class="price">$45.00</div>
            
            <p class="description">
                This handcrafted, sitting tree features a slumped posture, a permanent frown, and a tiny, stainless steel knife. Perfect for desks that need a touch of existential dread.
            </p>

            <button class="buy-button" onclick="alert('Added to cart! Be careful, it\'s sharp.')">
                Adopt This Tree
            </button>

            <p class="warning">
                * Handle with care. Tree does not enjoy hugs.
            </p>
        </div>
    </div>

</body>
</html>
