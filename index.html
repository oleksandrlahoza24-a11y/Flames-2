<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invincible: Viltrum Orbit</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #05050a;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        /* Starry Background */
        .stars {
            position: absolute;
            width: 2px;
            height: 2px;
            background: white;
            box-shadow: 
                20vw 10vh #fff, 40vw 30vh #fff, 60vw 15vh #fff, 80vw 45vh #fff,
                10vw 70vh #fff, 30vw 85vh #fff, 55vw 60vh #fff, 90vw 90vh #fff,
                15vw 25vh #fff, 75vw 75vh #fff, 35vw 40vh #fff, 65vw 5vh #fff;
            animation: twinkle 5s infinite;
        }

        /* Viltrum Planet */
        .viltrum {
            position: relative;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle at 30% 30%, #e0e0e0, #8a8a8a 40%, #4a4a4a 70%, #1a1a1a);
            border-radius: 50%;
            box-shadow: -20px -20px 50px rgba(255, 255, 255, 0.1) inset, 
                        0 0 40px rgba(100, 100, 150, 0.3);
            overflow: hidden;
        }

        /* Ring around Viltrum */
        .ring {
            position: absolute;
            width: 500px;
            height: 100px;
            border: 8px solid rgba(200, 200, 200, 0.4);
            border-radius: 50%;
            transform: rotateX(75deg) rotateY(-10deg);
            z-index: 1;
        }

        /* Simple Omni-Man Sprite */
        .omni-man {
            position: absolute;
            width: 40px;
            height: 80px;
            z-index: 10;
            animation: float 6s ease-in-out infinite;
            text-align: center;
        }

        /* Visual representation of Omni-Man */
        .cape {
            position: absolute;
            top: 10px;
            left: -5px;
            width: 50px;
            height: 60px;
            background: #d32f2f;
            border-radius: 5px;
            transform: skewY(10deg);
        }

        .suit {
            position: absolute;
            width: 30px;
            height: 50px;
            background: #ffffff;
            border-radius: 10px;
            border-left: 5px solid #d32f2f;
            border-right: 5px solid #d32f2f;
            left: 5px;
            top: 10px;
        }

        .head {
            position: absolute;
            width: 20px;
            height: 20px;
            background: #ffdbac;
            border-radius: 50%;
            top: -10px;
            left: 10px;
        }

        .mustache {
            position: absolute;
            width: 10px;
            height: 3px;
            background: #333;
            bottom: 5px;
            left: 5px;
        }

        /* Animations */
        @keyframes float {
            0%, 100% { transform: translate(150px, -50px) rotate(5deg); }
            50% { transform: translate(170px, -80px) rotate(-5deg); }
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.8; }
            50% { opacity: 0.3; }
        }
    </style>
</head>
<body>

    <div class="stars"></div>
    
    <div class="ring"></div>
    
    <div class="viltrum">
        <!-- Texture/Surface highlights -->
        <div style="position:absolute; width:100%; height:100%; opacity:0.2; background: repeating-linear-gradient(45deg, transparent, transparent 20px, #000 20px, #000 40px);"></div>
    </div>

    <div class="omni-man">
        <div class="cape"></div>
        <div class="suit"></div>
        <div class="head">
            <div class="mustache"></div>
        </div>
    </div>

</body>
</html>
