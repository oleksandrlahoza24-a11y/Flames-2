<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emanuel Protocol: Virtual Defusal</title>
    <style>
        :root {
            --lcd-green: #33ff33;
            --danger-red: #ff0000;
            --case-grey: #2a2a2a;
        }

        body {
            background-color: #121212;
            color: white;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        #device-case {
            background: var(--case-grey);
            padding: 40px;
            border: 8px solid #444;
            border-radius: 10px;
            box-shadow: 0 0 50px rgba(0,0,0,0.8), inset 0 0 20px rgba(255,255,255,0.1);
            text-align: center;
            width: 400px;
        }

        .lcd-display {
            background: #051a05;
            border: 4px solid #111;
            padding: 20px;
            margin-bottom: 30px;
            box-shadow: inset 0 0 15px rgba(51, 255, 51, 0.2);
        }

        #timer {
            font-size: 4rem;
            color: var(--lcd-green);
            text-shadow: 0 0 10px var(--lcd-green);
            margin: 0;
        }

        .label {
            font-size: 0.8rem;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 5px;
        }

        .wire-container {
            display: flex;
            justify-content: space-around;
            padding: 20px 0;
            background: #1a1a1a;
            border-radius: 5px;
        }

        .wire {
            width: 15px;
            height: 100px;
            cursor: pointer;
            transition: all 0.3s;
            border-radius: 5px;
            position: relative;
        }

        .wire::after {
            content: '';
            position: absolute;
            top: 0; left: 4px; right: 4px; bottom: 0;
            background: rgba(255,255,255,0.1);
        }

        .wire:hover { filter: brightness(1.3); }

        #wire-red { background: #d32f2f; }
        #wire-blue { background: #1976d2; }
        #wire-yellow { background: #fbc02d; }
        #wire-emanuel { background: #7b1fa2; } /* Purple for Emanuel */

        .cut {
            height: 40px !important;
            margin-bottom: 60px;
            cursor: default !important;
        }

        #status-led {
            width: 15px;
            height: 15px;
            border-radius: 50%;
            background: #440000;
            display: inline-block;
            margin-top: 20px;
        }

        .pulse { animation: pulse-red 0.5s infinite; }

        @keyframes pulse-red {
            0% { background: #440000; box-shadow: none; }
            50% { background: var(--danger-red); box-shadow: 0 0 10px var(--danger-red); }
            100% { background: #440000; box-shadow: none; }
        }
    </style>
</head>
<body>

<div id="device-case">
    <div class="label">System Status: Emmanuel Module Active</div>
    <div class="lcd-display">
        <p id="timer">10.00</p>
    </div>

    <div class="wire-container">
        <div id="wire-red" class="wire" onclick="cutWire(this, false)"></div>
        <div id="wire-blue" class="wire" onclick="cutWire(this, false)"></div>
        <div id="wire-emanuel" class="wire" onclick="cutWire(this, true)"></div>
        <div id="wire-yellow" class="wire" onclick="cutWire(this, false)"></div>
    </div>
    
    <div id="status-led" class="pulse"></div>
    <div id="log" style="margin-top: 15px; color: #666; font-size: 0.7rem;">AWAITING EMANUEL OVERRIDE...</div>
</div>

<script>
    let timeLeft = 10.00;
    let isActive = true;
    const timerEl = document.getElementById('timer');
    const ledEl = document.getElementById('status-led');
    const logEl = document.getElementById('log');

    const tick = setInterval(() => {
        if (!isActive) return;

        timeLeft -= 0.01;
        timerEl.textContent = timeLeft.toFixed(2);

        if (timeLeft <= 3) {
            timerEl.style.color = "var(--danger-red)";
            timerEl.style.textShadow = "0 0 15px var(--danger-red)";
        }

        if (timeLeft <= 0) {
            triggerEnd(false);
        }
    }, 10);

    function cutWire(element, isCorrect) {
        if (!isActive || element.classList.contains('cut')) return;

        element.classList.add('cut');
        
        if (isCorrect) {
            triggerEnd(true);
        } else {
            // Cutting the wrong wire speeds up the timer!
            timeLeft -= 2;
            logEl.textContent = "ERROR: SYSTEM INTERFERENCE DETECTED";
            logEl.style.color = "var(--danger-red)";
        }
    }

    function triggerEnd(success) {
        isActive = false;
        clearInterval(tick);
        
        if (success) {
            timerEl.style.color = "#33ff33";
            timerEl.textContent = "SAFE";
            ledEl.style.background = "#33ff33";
            ledEl.classList.remove('pulse');
            logEl.textContent = "EMANUEL PROTOCOL SUCCESSFUL. DEVICE DISARMED.";
            logEl.style.color = "#33ff33";
        } else {
            timerEl.textContent = "0.00";
            document.body.style.background = "var(--danger-red)";
            logEl.textContent = "CRITICAL FAILURE: DEVICE DETONATED.";
            logEl.style.color = "white";
            alert("BOOM! The Emanuel module was not bypassed in time.");
            location.reload(); 
        }
    }
</script>

</body>
</html>
