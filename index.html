<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Virtual Bomb Game</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: #222;
            color: white;
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            overflow: hidden;
        }

        #bomb {
            font-size: 100px;
            cursor: pointer;
            transition: transform 0.1s;
            user-select: none;
        }

        #bomb:active {
            transform: scale(0.9);
        }

        #timer {
            font-size: 3rem;
            margin-bottom: 20px;
            color: #ff4444;
        }

        .status-message {
            font-size: 1.5rem;
            margin-top: 20px;
            height: 2rem;
        }

        /* Shake animation for the countdown */
        .shake {
            animation: shake 0.5s infinite;
        }

        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            10% { transform: translate(-1px, -2px) rotate(-1deg); }
            20% { transform: translate(-3px, 0px) rotate(1deg); }
            30% { transform: translate(3px, 2px) rotate(0deg); }
            40% { transform: translate(1px, -1px) rotate(1deg); }
            50% { transform: translate(-1px, 2px) rotate(-1deg); }
            60% { transform: translate(-3px, 1px) rotate(0deg); }
            70% { transform: translate(3px, 1px) rotate(-1deg); }
            80% { transform: translate(-1px, -1px) rotate(1deg); }
            90% { transform: translate(1px, 2px) rotate(0deg); }
            100% { transform: translate(1px, -2px) rotate(-1deg); }
        }
    </style>
</head>
<body>

    <div id="timer">5.00</div>
    <div id="bomb" onclick="defuse()">💣</div>
    <div id="message" class="status-message">Quick! Click the bomb to defuse it!</div>

    <script>
        let timeLeft = 5.00;
        let active = true;
        const timerDisplay = document.getElementById('timer');
        const bombDisplay = document.getElementById('bomb');
        const messageDisplay = document.getElementById('message');

        // Update the countdown every 10 milliseconds
        const countdown = setInterval(() => {
            if (active) {
                timeLeft -= 0.01;
                timerDisplay.textContent = timeLeft.toFixed(2);

                if (timeLeft <= 2) {
                    bombDisplay.classList.add('shake');
                }

                if (timeLeft <= 0) {
                    explode();
                }
            }
        }, 10);

        function defuse() {
            if (active && timeLeft > 0) {
                active = false;
                clearInterval(countdown);
                bombDisplay.classList.remove('shake');
                bombDisplay.textContent = '⚙️'; // Changes to a safe gear
                messageDisplay.textContent = "Phew! Defused just in time.";
                messageDisplay.style.color = "#44ff44";
                timerDisplay.style.color = "#44ff44";
            }
        }

        function explode() {
            active = false;
            clearInterval(countdown);
            timerDisplay.textContent = "0.00";
            bombDisplay.classList.remove('shake');
            bombDisplay.textContent = '💥';
            messageDisplay.textContent = "BOOM! Too slow!";
            document.body.style.backgroundColor = "#ff4444";
            setTimeout(() => {
                document.body.style.backgroundColor = "#222";
            }, 200);
        }
    </script>
</body>
</html>
