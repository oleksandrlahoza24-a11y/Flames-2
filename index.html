<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sorrow Wood 3D</title>
    <style>
        body { margin: 0; overflow: hidden; background: #050505; font-family: 'Segoe UI', sans-serif; }
        #ui {
            position: absolute; top: 20px; left: 20px; color: #ff4444;
            font-size: 24px; text-shadow: 2px 2px #000; pointer-events: none;
        }
        #msg {
            position: absolute; bottom: 100px; width: 100%; text-align: center;
            color: #888; font-style: italic; font-size: 18px;
        }
        canvas { touch-action: none; }
    </style>
</head>
<body>
    <div id="ui">TREES DEFEATED: <span id="score">0</span></div>
    <div id="msg">Tap the sad trees to release their sorrow...</div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // --- Setup ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a0f);
        scene.fog = new THREE.FogExp2(0x0a0a0f, 0.15);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 2, 5);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        // --- Lighting ---
        const ambient = new THREE.AmbientLight(0x404040, 2);
        scene.add(ambient);
        const moonlight = new THREE.DirectionalLight(0x4444ff, 1);
        moonlight.position.set(5, 10, 5);
        scene.add(moonlight);

        // --- Ground ---
        const ground = new THREE.Mesh(
            new THREE.PlaneGeometry(100, 100),
            new THREE.MeshStandardMaterial({ color: 0x111111 })
        );
        ground.rotation.x = -Math.PI / 2;
        scene.add(ground);

        // --- Game Logic ---
        let score = 0;
        const trees = [];
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        function createTree() {
            const group = new THREE.Group();
            
            // Trunk
            const trunk = new THREE.Mesh(
                new THREE.CylinderGeometry(0.2, 0.3, 1.5),
                new THREE.MeshStandardMaterial({ color: 0x221100 })
            );
            trunk.position.y = 0.75;
            group.add(trunk);

            // Foliage (The "Sad" part - droopy)
            const foliage = new THREE.Mesh(
                new THREE.ConeGeometry(0.8, 2, 8),
                new THREE.MeshStandardMaterial({ color: 0x113311 })
            );
            foliage.position.y = 2;
            foliage.rotation.z = Math.random() * 0.2 - 0.1; // Slight droop
            group.add(foliage);

            // Eyes (Sad dots)
            const eyeGeo = new THREE.SphereGeometry(0.05);
            const eyeMat = new THREE.MeshBasicMaterial({ color: 0x44aaff });
            const eyeL = new THREE.Mesh(eyeGeo, eyeMat);
            eyeL.position.set(-0.15, 2, 0.7);
            const eyeR = eyeL.clone();
            eyeR.position.x = 0.15;
            group.add(eyeL, eyeR);

            group.position.set(Math.random() * 10 - 5, 0, Math.random() * -10 - 2);
            scene.add(group);
            trees.push(group);
        }

        // Spawn initial trees
        for(let i = 0; i < 8; i++) createTree();

        // --- Input Handling ---
        function onAction(event) {
            // Handle both touch and mouse
            const x = event.touches ? event.touches[0].clientX : event.clientX;
            const y = event.touches ? event.touches[0].clientY : event.clientY;
            
            mouse.x = (x / window.innerWidth) * 2 - 1;
            mouse.y = -(y / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(scene.children, true);

            for (let obj of intersects) {
                let root = obj.object.parent;
                if (trees.includes(root)) {
                    score++;
                    document.getElementById('score').innerText = score;
                    
                    // Epic "Death" animation
                    root.userData.dying = true;
                    setTimeout(() => {
                        scene.remove(root);
                        trees.splice(trees.indexOf(root), 1);
                        createTree(); // Respawn
                    }, 200);
                    break;
                }
            }
        }

        window.addEventListener('touchstart', onAction);
        window.addEventListener('mousedown', onAction);

        // --- Animation Loop ---
        function animate() {
            requestAnimationFrame(animate);

            trees.forEach(tree => {
                if (tree.userData.dying) {
                    tree.scale.multiplyScalar(0.8);
                    tree.rotation.y += 0.5;
                } else {
                    // Gentle sad swaying
                    tree.rotation.z = Math.sin(Date.now() * 0.002) * 0.05;
                }
            });

            renderer.render(scene, camera);
        }

        animate();

        // Handle Resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
