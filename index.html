<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Roll!</title>
<script src="assets.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1a2e;
    overflow: hidden;
    width: 100vw;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-end;
    touch-action: none;
    user-select: none;
  }
  canvas {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
  }
  #controls {
    position: absolute;
    bottom: 32px;
    width: 100%;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 40px;
    z-index: 10;
  }
  .btn-group { display: flex; gap: 16px; }
  .btn {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    background: #0f3460;
    border: 3px solid #e94560;
    color: #fff;
    font-size: 28px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    transition: transform 0.08s, background 0.08s;
    box-shadow: 0 4px 24px rgba(233,69,96,0.25);
  }
  .btn:active { transform: scale(0.9); background: #e94560; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="controls">
  <div class="btn-group">
    <div class="btn" id="btn-left">◀</div>
    <div class="btn" id="btn-right">▶</div>
  </div>
  <div class="btn-group">
    <div class="btn" id="btn-jump">▲</div>
  </div>
</div>
<script>
const canvas = document.getElementById("c");
const ctx    = canvas.getContext("2d");

let W, H, groundY;
function resize() {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
  groundY = H - ASSETS.world.groundHeight;
}
resize();
window.addEventListener("resize", resize);

const p = {
  x:  200,
  y:  300,
  vx: 0,
  vy: 0,
  r:  ASSETS.player.radius,
  angle: 0,
  onGround: false,
};

const trail = [];
const keys  = { left: false, right: false, jump: false };
let jumpUsed = false;

function bindBtn(id, action) {
  const el = document.getElementById(id);
  el.addEventListener("touchstart", e => { e.preventDefault(); keys[action] = true;  }, { passive: false });
  el.addEventListener("touchend",   e => { e.preventDefault(); keys[action] = false; }, { passive: false });
  el.addEventListener("mousedown",  ()  => { keys[action] = true;  });
  el.addEventListener("mouseup",    ()  => { keys[action] = false; });
}
bindBtn("btn-left",  "left");
bindBtn("btn-right", "right");
bindBtn("btn-jump",  "jump");

function update() {
  const A = ASSETS.physics;

  if (keys.left)  p.vx -= A.moveForce;
  if (keys.right) p.vx += A.moveForce;

  if (keys.jump && p.onGround && !jumpUsed) {
    p.vy = -A.jumpForce;
    jumpUsed = true;
  }
  if (!keys.jump) jumpUsed = false;

  p.vy += A.gravity;
  if (!keys.left && !keys.right) p.vx *= A.friction;
  p.vx = Math.max(-A.maxSpeed, Math.min(A.maxSpeed, p.vx));

  p.x += p.vx;
  p.y += p.vy;

  if (p.y + p.r >= groundY) {
    p.y = groundY - p.r;
    p.vy = 0;
    p.onGround = true;
  } else {
    p.onGround = false;
  }

  if (p.x - p.r < 0)  { p.x = p.r;  p.vx = Math.abs(p.vx) * 0.4; }
  if (p.x + p.r > W)  { p.x = W - p.r; p.vx = -Math.abs(p.vx) * 0.4; }

  p.angle += p.vx * 0.06;

  trail.push({ x: p.x, y: p.y });
  if (trail.length > ASSETS.trail.maxLength) trail.shift();
}

function drawGround() {
  const C = ASSETS.colors;
  ctx.fillStyle = C.ground;
  ctx.fillRect(0, groundY, W, H - groundY);

  ctx.strokeStyle = C.groundLine;
  ctx.lineWidth   = 2;
  ctx.setLineDash([24, 16]);
  ctx.beginPath();
  ctx.moveTo(0, groundY);
  ctx.lineTo(W, groundY);
  ctx.stroke();
  ctx.setLineDash([]);
}

function drawTrail() {
  for (let i = 0; i < trail.length; i++) {
    const alpha = (i / trail.length) * 0.5;
    const r = ASSETS.trail.radius * (i / trail.length);
    ctx.beginPath();
    ctx.arc(trail[i].x, trail[i].y, r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(233,69,96,${alpha})`;
    ctx.fill();
  }
}

function drawPlayer() {
  const C = ASSETS.colors;
  ctx.save();
  ctx.translate(p.x, p.y);
  ctx.rotate(p.angle);

  ctx.beginPath();
  ctx.arc(0, 4, p.r, 0, Math.PI * 2);
  ctx.fillStyle = C.playerShadow;
  ctx.fill();

  ctx.beginPath();
  ctx.arc(0, 0, p.r, 0, Math.PI * 2);
  const grad = ctx.createRadialGradient(-8, -8, 2, 0, 0, p.r);
  grad.addColorStop(0, C.playerShine);
  grad.addColorStop(0.5, C.player);
  grad.addColorStop(1, C.playerShadow);
  ctx.fillStyle = grad;
  ctx.fill();

  ctx.beginPath();
  ctx.moveTo(0, 0);
  ctx.lineTo(0, -p.r + 4);
  ctx.strokeStyle = "rgba(255,255,255,0.35)";
  ctx.lineWidth = 3;
  ctx.lineCap = "round";
  ctx.stroke();

  ctx.restore();
}

function loop() {
  update();
  ctx.clearRect(0, 0, W, H);

  const bg = ctx.createLinearGradient(0, 0, 0, H);
  bg.addColorStop(0, ASSETS.colors.background);
  bg.addColorStop(1, "#0d0d1a");
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, W, H);

  drawGround();
  drawTrail();
  drawPlayer();

  requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
