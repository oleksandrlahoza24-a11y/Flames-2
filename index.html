<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Cozy Immersive PNG Experience</title>
  <style>
    /* CSS Reset & Base */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body,
    html {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background-color: #050505;
      color: #fff;
    }

    /* --- SETUP SCREEN --- */
    #setup-container {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(-45deg, #16102b, #2b1738, #18283b, #0d1221);
      background-size: 400% 400%;
      animation: gradientFlow 15s ease infinite;
      z-index: 100;
      transition: opacity 1s ease, visibility 1s ease;
    }

    @keyframes gradientFlow {
      0% {
        background-position: 0% 50%;
      }

      50% {
        background-position: 100% 50%;
      }

      100% {
        background-position: 0% 50%;
      }
    }

    .glass-card {
      background: rgba(20, 20, 30, 0.4);
      padding: 40px;
      border-radius: 24px;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5), inset 0 0 0 1px rgba(255, 255, 255, 0.1);
      text-align: center;
      max-width: 90%;
      width: 420px;
      transform: translateY(0);
      transition: transform 0.3s ease;
    }

    .glass-card h1 {
      margin-bottom: 25px;
      font-weight: 400;
      font-size: 1.8rem;
      letter-spacing: 0.5px;
    }

    .input-group {
      margin-bottom: 25px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      text-align: left;
    }

    label {
      font-size: 0.95rem;
      color: #a19db1;
      font-weight: 500;
    }

    /* Custom File Upload Zone */
    .file-drop-zone {
      position: relative;
      width: 100%;
      padding: 30px 20px;
      border: 2px dashed rgba(255, 255, 255, 0.2);
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.03);
      text-align: center;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .file-drop-zone:hover {
      border-color: #a78bfa;
      background: rgba(167, 139, 250, 0.05);
    }

    .file-drop-zone p {
      font-size: 0.9rem;
      color: #fff;
      pointer-events: none;
    }

    .file-drop-zone small {
      color: #8b879c;
      font-size: 0.8rem;
      pointer-events: none;
    }

    input[type="file"] {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      opacity: 0;
      cursor: pointer;
    }

    select {
      width: 100%;
      padding: 14px;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      background: rgba(0, 0, 0, 0.3);
      color: #fff;
      outline: none;
      cursor: pointer;
      font-size: 1rem;
      appearance: none;
    }

    select option {
      background: #1a1525;
      color: #fff;
    }

    #applyBtn {
      background: linear-gradient(135deg, #8b5cf6, #d946ef);
      border: none;
      padding: 16px 30px;
      border-radius: 12px;
      color: white;
      font-size: 1.1rem;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.3s ease;
      width: 100%;
      box-shadow: 0 8px 20px rgba(139, 92, 246, 0.3);
    }

    #applyBtn:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 25px rgba(217, 70, 239, 0.4);
    }

    #applyBtn:active {
      transform: translateY(1px);
    }

    /* --- IMMERSIVE ENVIRONMENT --- */
    #immersive-container {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at 50% 50%, #15111e 0%, #060408 100%);
      visibility: hidden;
      opacity: 0;
      transition: opacity 1.5s ease;
      overflow: hidden;
      cursor: default;
    }

    /* Tiny Fullscreen Button (Top Right) */
    #fsBtn {
      position: absolute;
      top: 12px;
      right: 12px;
      width: 8px;
      height: 8px;
      background: rgba(255, 255, 255, 0.15);
      border: none;
      border-radius: 50%;
      cursor: pointer;
      z-index: 1000;
      transition: all 0.3s;
    }

    #fsBtn:hover {
      background: rgba(255, 255, 255, 0.8);
      transform: scale(2);
      box-shadow: 0 0 8px #fff;
    }

    /* Hardware Acceleration Wrapper */
    #animContainer {
      position: relative;
      width: 100%;
      height: 100%;
      perspective: 1200px;
      transform-style: preserve-3d;
    }

    .hw-accel {
      will-change: transform;
      backface-visibility: hidden;
    }

    /* ANIMATION 1: Strips */
    .strip-wrapper {
      display: flex;
      flex-direction: column;
      justify-content: space-evenly;
      height: 100%;
      transform: rotate(-5deg) scale(1.1);
    }

    .strip {
      display: flex;
      width: max-content;
      gap: 40px;
    }

    .strip img {
      height: 25vh;
      max-width: 300px;
      object-fit: contain;
      filter: drop-shadow(0 15px 25px rgba(0, 0, 0, 0.6));
    }

    .strip1 {
      animation: rollLeft 35s linear infinite;
    }

    .strip2 {
      animation: rollRight 40s linear infinite;
    }

    @keyframes rollLeft {
      0% {
        transform: translate3d(0, 0, 0);
      }

      100% {
        transform: translate3d(-50%, 0, 0);
      }
    }

    @keyframes rollRight {
      0% {
        transform: translate3d(-50%, 0, 0);
      }

      100% {
        transform: translate3d(0, 0, 0);
      }
    }

    /* ANIMATION 2: Rain */
    .rain-img {
      position: absolute;
      top: 0;
      left: 0;
      object-fit: contain;
      animation: fall linear infinite;
      opacity: 0.8;
    }

    @keyframes fall {
      0% {
        transform: translate3d(var(--startX), -20vh, 0) scale(var(--scale)) rotate(var(--rot));
      }

      100% {
        transform: translate3d(var(--startX), 120vh, 0) scale(var(--scale)) rotate(calc(var(--rot) + 20deg));
      }
    }

    /* ANIMATION 3: Space */
    .space-img {
      position: absolute;
      left: 50%;
      top: 50%;
      object-fit: contain;
      animation: flowSpace linear infinite;
      opacity: 0;
    }

    @keyframes flowSpace {
      0% {
        transform: translate3d(0, 0, -1000px) scale(0) rotate(0deg);
        opacity: 0;
      }

      20% {
        opacity: 1;
      }

      80% {
        opacity: 1;
      }

      100% {
        transform: translate3d(var(--tx), var(--ty), 500px) scale(var(--scale)) rotate(var(--rot));
        opacity: 0;
      }
    }

    /* ANIMATION 4: Bouncing (JS controlled, simple base style) */
    .bounce-img {
      position: absolute;
      left: 0;
      top: 0;
      object-fit: contain;
      filter: drop-shadow(0 20px 20px rgba(0, 0, 0, 0.5));
    }

    /* ANIMATION 5: Bubbles */
    .bubble-img {
      position: absolute;
      bottom: -20vh;
      left: 0;
      object-fit: contain;
      animation: floatUp linear infinite;
    }

    @keyframes floatUp {
      0% {
        transform: translate3d(var(--startX), 20vh, 0) scale(var(--scale)) rotate(var(--rot));
        opacity: 0;
      }

      10% {
        opacity: var(--max-opacity);
      }

      90% {
        opacity: var(--max-opacity);
      }

      100% {
        transform: translate3d(calc(var(--startX) + var(--sway)), -120vh, 0) scale(var(--scale)) rotate(calc(var(--rot) + 90deg));
        opacity: 0;
      }
    }

    /* ANIMATION 6: Whirlwind */
    .whirlwind-wrapper {
      position: absolute;
      top: 50%;
      left: 50%;
      transform-style: preserve-3d;
      animation: spinY 20s linear infinite;
    }

    .whirlwind-img {
      position: absolute;
      top: 50%;
      left: 50%;
      object-fit: contain;
    }

    @keyframes spinY {
      0% {
        transform: translate3d(-50%, -50%, 0) rotateY(0deg) rotateX(-10deg);
      }

      100% {
        transform: translate3d(-50%, -50%, 0) rotateY(360deg) rotateX(-10deg);
      }
    }

    /* ANIMATION 7: Orbit */
    .orbit-wrapper {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 1px;
      height: 1px;
    }

    .orbit-container {
      position: absolute;
      transform-style: preserve-3d;
      animation: orbitRing linear infinite;
    }

    .orbit-img {
      position: absolute;
      object-fit: contain;
      transform: translate(-50%, -50%);
      animation: counterOrbit linear infinite;
    }

    @keyframes orbitRing {
      0% {
        transform: rotateZ(0deg);
      }

      100% {
        transform: rotateZ(360deg);
      }
    }

    @keyframes counterOrbit {
      0% {
        transform: translate(-50%, -50%) rotateZ(0deg);
      }

      100% {
        transform: translate(-50%, -50%) rotateZ(-360deg);
      }
    }
  </style>
</head>

<body>

  <!-- Setup Screen -->
  <div id="setup-container">
    <div class="glass-card">
      <h1>Immersive View</h1>
      <div class="input-group">
        <label>1. Upload PNGs (Any amount)</label>
        <div class="file-drop-zone" id="dropZone">
          <input type="file" id="fileInput" multiple accept="image/png">
          <p id="fileCountText">Click or Drop PNGs here</p>
          <small>High resolution is supported</small>
        </div>
      </div>
      <div class="input-group">
        <label for="animSelect">2. Choose the vibe</label>
        <select id="animSelect">
                    <option value="rain">Cozy Rain (Falling smoothly)</option>
                    <option value="bubbles">Floating Bubbles (Gentle rise)</option>
                    <option value="space">Deep Space (Zooming past)</option>
                    <option value="whirlwind">3D Whirlwind (Tornado)</option>
                    <option value="orbit">Orbit (Circling center)</option>
                    <option value="strips">Two Rolling Strips (Marquee)</option>
                    <option value="bounce">Bouncing Physics</option>
                </select>
      </div>
      <button id="applyBtn">Apply & Immerse</button>
    </div>
  </div>

  <!-- Immersive Screen -->
  <div id="immersive-container">
    <!-- Tiny hidden button for full screen trigger -->
    <button id="fsBtn" title="Toggle Fullscreen"></button>
    <div id="animContainer"></div>
  </div>

  <script>
    // DOM Elements
        const setupContainer = document.getElementById('setup-container');
        const immersiveContainer = document.getElementById('immersive-container');
        const fileInput = document.getElementById('fileInput');
        const fileCountText = document.getElementById('fileCountText');
        const animSelect = document.getElementById('animSelect');
        const applyBtn = document.getElementById('applyBtn');
        const animContainer = document.getElementById('animContainer');
        const fsBtn = document.getElementById('fsBtn');

        let imageURLs = [];
        let animationFrameId = null;
        let bouncePhysicsData = [];
        
        // Cache window dimensions for physics to avoid lag
        let winW = window.innerWidth;
        let winH = window.innerHeight;
        window.addEventListener('resize', () => { winW = window.innerWidth; winH = window.innerHeight; });

        // Auto-hide cursor for true immersion
        let cursorTimeout;
        document.addEventListener('mousemove', () => {
            if(immersiveContainer.style.visibility === 'visible') {
                document.body.style.cursor = 'default';
                clearTimeout(cursorTimeout);
                cursorTimeout = setTimeout(() => { document.body.style.cursor = 'none'; }, 2000);
            }
        });

        // Handle File Uploads
        fileInput.addEventListener('change', (e) => {
            const files = Array.from(e.target.files).filter(f => f.type === "image/png");
            if (files.length > 0) {
                imageURLs = files.map(file => URL.createObjectURL(file));
                fileCountText.innerText = `${files.length} PNG(s) loaded ✨`;
                fileCountText.style.color = "#d946ef";
            } else {
                fileCountText.innerText = `Click or Drop PNGs here`;
                fileCountText.style.color = "#fff";
            }
        });

        // Apply Button Logic
        applyBtn.addEventListener('click', () => {
            if (imageURLs.length === 0) {
                alert("Please upload at least one PNG file first.");
                return;
            }
            // Transition UI
            setupContainer.style.opacity = '0';
            setTimeout(() => {
                setupContainer.style.visibility = 'hidden';
                immersiveContainer.style.visibility = 'visible';
                immersiveContainer.style.opacity = '1';
                startAnimation(animSelect.value);
            }, 800);
        });

        // Fullscreen Logic (Hides top bar on iPad/Desktop)
        fsBtn.addEventListener('click', () => {
            const elem = document.documentElement;
            if (!document.fullscreenElement && !document.webkitFullscreenElement) {
                if (elem.requestFullscreen) elem.requestFullscreen();
                else if (elem.webkitRequestFullscreen) elem.webkitRequestFullscreen();
            } else {
                if (document.exitFullscreen) document.exitFullscreen();
                else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
            }
        });

        // Helper: Ensure we have enough items for rich visual effects without overwhelming DOM
        function getPopulatedImageArray(idealAmount, maxAmount = 80) {
            let arr = [...imageURLs];
            while (arr.length < idealAmount && arr.length < maxAmount) { arr = arr.concat(imageURLs); }
            return arr.slice(0, maxAmount);
        }

        // Helper: Create an Image with async decoding for performance
        function createOptimizedImg(src, className) {
            const img = document.createElement('img');
            img.src = src;
            img.className = `hw-accel ${className}`;
            img.decoding = "async"; // Prevents lag spikes when rendering
            return img;
        }

        // --- ANIMATION ROUTER ---
        function startAnimation(type) {
            animContainer.innerHTML = '';
            if (animationFrameId) cancelAnimationFrame(animationFrameId);

            if (type === 'strips') runStrips();
            else if (type === 'rain') runRain();
            else if (type === 'space') runSpace();
            else if (type === 'bounce') runBounce();
            else if (type === 'bubbles') runBubbles();
            else if (type === 'whirlwind') runWhirlwind();
            else if (type === 'orbit') runOrbit();
        }

        // 1. Rolling Strips
        function runStrips() {
            const stripImages = getPopulatedImageArray(30, 40);
            const wrapper = document.createElement('div');
            wrapper.className = 'strip-wrapper';

            const fillStrip = (className) => {
                const strip = document.createElement('div');
                strip.className = `hw-accel strip ${className}`;
                [...stripImages, ...stripImages].forEach(src => strip.appendChild(createOptimizedImg(src, '')));
                return strip;
            };

            wrapper.appendChild(fillStrip('strip1'));
            wrapper.appendChild(fillStrip('strip2'));
            animContainer.appendChild(wrapper);
        }

        // 2. Cozy Rain
        function runRain() {
            const drops = getPopulatedImageArray(40, 60);
            const fragment = document.createDocumentFragment();

            drops.forEach(src => {
                const img = createOptimizedImg(src, 'rain-img');
                const size = 30 + Math.random() * 60;
                const startX = Math.random() * 100;
                const duration = 4 + Math.random() * 6;
                const delay = Math.random() * -10; // Negative delay so it starts mid-animation
                const rot = (Math.random() - 0.5) * 45;

                img.style.width = `${size}px`;
                img.style.setProperty('--startX', `${startX}vw`);
                img.style.setProperty('--scale', 1);
                img.style.setProperty('--rot', `${rot}deg`);
                img.style.animationDuration = `${duration}s`;
                img.style.animationDelay = `${delay}s`;
                fragment.appendChild(img);
            });
            animContainer.appendChild(fragment);
        }

        // 3. Space Zoom
        function runSpace() {
            const objects = getPopulatedImageArray(50, 60);
            const fragment = document.createDocumentFragment();

            objects.forEach(src => {
                const img = createOptimizedImg(src, 'space-img');
                const tx = (Math.random() - 0.5) * 3000;
                const ty = (Math.random() - 0.5) * 3000;
                const scale = 2 + Math.random() * 4;
                const rot = (Math.random() - 0.5) * 360;
                const duration = 5 + Math.random() * 7;
                const delay = Math.random() * -10;

                img.style.width = `${30 + Math.random() * 40}px`;
                img.style.setProperty('--tx', `${tx}px`);
                img.style.setProperty('--ty', `${ty}px`);
                img.style.setProperty('--scale', scale);
                img.style.setProperty('--rot', `${rot}deg`);
                img.style.animationDuration = `${duration}s`;
                img.style.animationDelay = `${delay}s`;
                fragment.appendChild(img);
            });
            animContainer.appendChild(fragment);
        }

        // 4. Floating Bubbles
        function runBubbles() {
            const bubbles = getPopulatedImageArray(40, 50);
            const fragment = document.createDocumentFragment();

            bubbles.forEach(src => {
                const img = createOptimizedImg(src, 'bubble-img');
                const size = 40 + Math.random() * 70;
                const startX = Math.random() * 100;
                const sway = (Math.random() - 0.5) * 40; // Horizontal drift
                const duration = 8 + Math.random() * 12;
                const delay = Math.random() * -15;

                img.style.width = `${size}px`;
                img.style.setProperty('--startX', `${startX}vw`);
                img.style.setProperty('--sway', `${sway}vw`);
                img.style.setProperty('--scale', 0.8 + Math.random() * 0.5);
                img.style.setProperty('--rot', `${Math.random() * 360}deg`);
                img.style.setProperty('--max-opacity', 0.4 + Math.random() * 0.6);
                img.style.animationDuration = `${duration}s`;
                img.style.animationDelay = `${delay}s`;
                fragment.appendChild(img);
            });
            animContainer.appendChild(fragment);
        }

        // 5. 3D Whirlwind
        function runWhirlwind() {
            const objects = getPopulatedImageArray(40, 50);
            const wrapper = document.createElement('div');
            wrapper.className = 'whirlwind-wrapper';

            objects.forEach((src, i) => {
                const img = createOptimizedImg(src, 'whirlwind-img');
                const size = 50 + Math.random() * 60;
                
                // Cylinder distribution
                const angle = (i / objects.length) * 360 + (Math.random() * 20);
                const height = (Math.random() - 0.5) * 800; // Spread vertically
                const radius = 300 + Math.random() * 200;

                img.style.width = `${size}px`;
                img.style.transform = `translate(-50%, -50%) translateY(${height}px) rotateY(${angle}deg) translateZ(${radius}px)`;
                wrapper.appendChild(img);
            });
            animContainer.appendChild(wrapper);
        }

        // 6. Orbit
        function runOrbit() {
            const objects = getPopulatedImageArray(25, 30);
            const wrapper = document.createElement('div');
            wrapper.className = 'orbit-wrapper';

            objects.forEach((src, i) => {
                const container = document.createElement('div');
                container.className = 'orbit-container';
                
                const img = createOptimizedImg(src, 'orbit-img');
                const size = 60 + Math.random() * 60;
                const distance = 150 + Math.random() * 400; // Orbit radius
                const speed = 10 + Math.random() * 20; // Orbit duration
                const startAngle = Math.random() * 360;

                container.style.width = `${distance * 2}px`;
                container.style.height = `${distance * 2}px`;
                container.style.left = `-${distance}px`;
                container.style.top = `-${distance}px`;
                container.style.animationDuration = `${speed}s`;
                container.style.transform = `rotateZ(${startAngle}deg)`;
                
                // Inverse rotation on the image keeps it upright
                img.style.width = `${size}px`;
                img.style.left = `50%`;
                img.style.top = `0%`; // Positioned at the edge of the container
                img.style.animationDuration = `${speed}s`;

                container.appendChild(img);
                wrapper.appendChild(container);
            });
            animContainer.appendChild(wrapper);
        }

        // 7. High Performance Bouncing Physics
        function runBounce() {
            bouncePhysicsData = [];
            const bounceItems = getPopulatedImageArray(20, 25);
            const fragment = document.createDocumentFragment();
            
            bounceItems.forEach(src => {
                const img = createOptimizedImg(src, 'bounce-img');
                const size = 70 + Math.random() * 60;
                img.style.width = `${size}px`;
                fragment.appendChild(img);

                bouncePhysicsData.push({
                    el: img,
                    size: size,
                    x: Math.random() * (winW - size),
                    y: Math.random() * -500 - size,
                    vx: (Math.random() - 0.5) * 12,
                    vy: 0,
                    rot: Math.random() * 360,
                    vrot: (Math.random() - 0.5) * 8
                });
            });
            animContainer.appendChild(fragment);

            const gravity = 0.5;
            const friction = 0.99;
            const bounceDampening = -0.75;

            function updatePhysics() {
                bouncePhysicsData.forEach(item => {
                    item.vy += gravity;
                    item.x += item.vx;
                    item.y += item.vy;
                    item.rot += item.vrot;

                    // Floor
                    if (item.y + item.size >= winH) {
                        item.y = winH - item.size;
                        item.vy *= bounceDampening;
                        item.vx *= friction;
                    }
                    // Walls
                    if (item.x <= 0) { item.x = 0; item.vx *= -1; item.vrot *= -1;} 
                    else if (item.x + item.size >= winW) { item.x = winW - item.size; item.vx *= -1; item.vrot *= -1;}

                    // translate3d forces hardware acceleration
                    item.el.style.transform = `translate3d(${item.x}px, ${item.y}px, 0) rotate(${item.rot}deg)`;
                });
                animationFrameId = requestAnimationFrame(updatePhysics);
            }
            updatePhysics();
        }
  </script>
</body>

</html>
