<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- The meta tag below prevents the iPad from zooming in when you double-tap -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>My Pixel World</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #7ec850;
            overflow: hidden; /* Prevents scrollbars */
            font-family: sans-serif;
            touch-action: none; /* Prevents swipe-to-refresh and scrolling on mobile */
            user-select: none; /* Prevents highlighting text while tapping */
        }
        canvas {
            display: block;
            image-rendering: pixelated; 
        }
        
        /* 🎮 ON-SCREEN D-PAD CONTROLS */
        #dpad {
            position: fixed;
            bottom: 30px;
            right: 30px;
            display: grid;
            grid-template-columns: 60px 60px 60px;
            grid-template-rows: 60px 60px 60px;
            gap: 10px;
            opacity: 0.7; /* Slightly see-through */
            z-index: 10;
        }
        .dbtn {
            background-color: rgba(0, 0, 0, 0.5);
            color: white;
            border: 2px solid white;
            border-radius: 10px;
            font-size: 24px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            box-shadow: 0px 4px 6px rgba(0,0,0,0.3);
        }
        .dbtn:active {
            background-color: rgba(255, 255, 255, 0.5);
            color: black;
        }
        #btn-up { grid-column: 2; grid-row: 1; }
        #btn-left { grid-column: 1; grid-row: 2; }
        #btn-down { grid-column: 2; grid-row: 2; }
        #btn-right { grid-column: 3; grid-row: 2; }
    </style>
</head>
<body>

    <!-- The Game Canvas -->
    <canvas id="gameCanvas"></canvas>

    <!-- The On-Screen Controls for iPad/Mobile -->
    <div id="dpad">
        <div class="dbtn" id="btn-up">▲</div>
        <div class="dbtn" id="btn-left">◀</div>
        <div class="dbtn" id="btn-down">▼</div>
        <div class="dbtn" id="btn-right">▶</div>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        // Make canvas full screen
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas(); // Set initial size

        // ==========================================
        // 🎮 1. PLAYER SETTINGS
        // ==========================================
        const player = {
            x: window.innerWidth / 2, // Start in the middle of the screen
            y: window.innerHeight / 2,
            width: 20,
            height: 30,
            color: "#e74c3c",
            speed: 5,
            dx: 0,
            dy: 0
        };

        // ==========================================
        // 🌲 2. THE ASSETS DIRECTORY
        // ==========================================
        const worldAssets = {
            trees: [
                { x: 100, y: 150, size: 40, color: '#27ae60', trunk: '#8e44ad' },
                { x: 600, y: 100, size: 50, color: '#2ecc71', trunk: '#8e44ad' },
                { x: 450, y: 400, size: 35, color: '#27ae60', trunk: '#8e44ad' },
                { x: 700, y: 500, size: 60, color: '#229954', trunk: '#8e44ad' },
                { x: 200, y: 600, size: 45, color: '#2ecc71', trunk: '#8e44ad' }
            ],
            bushes: [
                { x: 200, y: 400, size: 20, color: '#2ecc71' },
                { x: 230, y: 410, size: 25, color: '#27ae60' },
                { x: 180, y: 420, size: 15, color: '#2ecc71' },
                { x: 500, y: 200, size: 22, color: '#27ae60' }
            ],
            rocks: [
                { x: 300, y: 100, width: 25, height: 15, color: '#7f8c8d' },
                { x: 320, y: 110, width: 15, height: 10, color: '#95a5a6' },
                { x: 100, y: 500, width: 30, height: 20, color: '#7f8c8d' }
            ],
            waterPonds: [
                { x: 50, y: 50, width: 150, height: 80, color: '#3498db' },
                { x: 550, y: 300, width: 200, height: 120, color: '#2980b9' }
            ]
        };

        // ==========================================
        // ⌨️ 3. INPUT HANDLING (Keyboard & Touch)
        // ==========================================
        const keys = {
            ArrowUp: false, ArrowDown: false, ArrowLeft: false, ArrowRight: false,
            w: false, a: false, s: false, d: false
        };

        // Keyboard Support
        window.addEventListener("keydown", (e) => {
            if (keys.hasOwnProperty(e.key)) keys[e.key] = true;
        });
        window.addEventListener("keyup", (e) => {
            if (keys.hasOwnProperty(e.key)) keys[e.key] = false;
        });

        // Touch / Mouse Support for D-Pad
        function bindDpad(buttonId, keyName) {
            const btn = document.getElementById(buttonId);
            
            // For iPads/Phones (Touch)
            btn.addEventListener("touchstart", (e) => { e.preventDefault(); keys[keyName] = true; });
            btn.addEventListener("touchend", (e) => { e.preventDefault(); keys[keyName] = false; });
            
            // For testing on Computer with a mouse click
            btn.addEventListener("mousedown", () => keys[keyName] = true);
            btn.addEventListener("mouseup", () => keys[keyName] = false);
            btn.addEventListener("mouseleave", () => keys[keyName] = false);
        }

        bindDpad("btn-up", "ArrowUp");
        bindDpad("btn-down", "ArrowDown");
        bindDpad("btn-left", "ArrowLeft");
        bindDpad("btn-right", "ArrowRight");

        // ==========================================
        // ⚙️ 4. GAME LOGIC & PHYSICS
        // ==========================================
        function update() {
            player.dx = 0;
            player.dy = 0;

            if (keys.ArrowUp || keys.w) player.dy = -player.speed;
            if (keys.ArrowDown || keys.s) player.dy = player.speed;
            if (keys.ArrowLeft || keys.a) player.dx = -player.speed;
            if (keys.ArrowRight || keys.d) player.dx = player.speed;

            player.x += player.dx;
            player.y += player.dy;

            // Keep player inside the full-screen canvas borders
            if (player.x < 0) player.x = 0;
            if (player.y < 0) player.y = 0;
            if (player.x + player.width > canvas.width) player.x = canvas.width - player.width;
            if (player.y + player.height > canvas.height) player.y = canvas.height - player.height;
        }

        // ==========================================
        // 🎨 5. DRAWING THE WORLD
        // ==========================================
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Draw Water Ponds
            worldAssets.waterPonds.forEach(pond => {
                ctx.fillStyle = pond.color;
                ctx.fillRect(pond.x, pond.y, pond.width, pond.height);
            });

            // Draw Rocks
            worldAssets.rocks.forEach(rock => {
                ctx.fillStyle = rock.color;
                ctx.fillRect(rock.x, rock.y, rock.width, rock.height);
            });

            // Draw Bushes
            worldAssets.bushes.forEach(bush => {
                ctx.fillStyle = bush.color;
                ctx.beginPath();
                ctx.arc(bush.x, bush.y, bush.size, 0, Math.PI * 2);
                ctx.fill();
            });

            // Draw Trees
            worldAssets.trees.forEach(tree => {
                ctx.fillStyle = '#5c4033'; 
                ctx.fillRect(tree.x - 5, tree.y, 10, tree.size);
                ctx.fillStyle = tree.color;
                ctx.beginPath();
                ctx.arc(tree.x, tree.y - tree.size / 2, tree.size, 0, Math.PI * 2);
                ctx.fill();
            });

            // Draw Player
            ctx.fillStyle = player.color;
            ctx.fillRect(player.x, player.y, player.width, player.height);
        }

        // ==========================================
        // 🔄 6. THE GAME LOOP
        // ==========================================
        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        gameLoop();
    </script>
</body>
</html>
